  .wrap.grabbing{cursor:grabbing}
  .stage{position:absolute;top:0;left:0;transform-origin:0 0}
  svg.edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  .node{position:absolute;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:6px 10px;font-size:12px;line-height:1.25;cursor:pointer;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05);display:flex;align-items:center;gap:7px}

  .node .lab{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .node .sub{color:var(--ink-faint);font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .node.source .sub{font-family:var(--font-mono)}
  .node.klass{border-left:4px solid var(--accent)}
  .node.inst{font-size:11px;background:var(--surface-2)}
  .node.inst .sub{font-family:var(--font-mono)}
  .node.more{background:transparent;border-style:dashed;color:var(--accent);justify-content:center;font-weight:600}
  .node.dim{opacity:.14}
  .node.hot{box-shadow:0 0 0 2px var(--accent);z-index:2}
  .ctrls{position:absolute;left:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:3}

  .hint{position:absolute;right:14px;bottom:12px;font-size:11px;color:var(--ink-faint);z-index:3;background:var(--surface);padding:4px 9px;border:1px solid var(--line);border-radius:7px}
</style>

<header class="top">

  <h1>Data Lineage Flow</h1>
  <p>기본은 <b>원 시스템 → 도메인</b> 요약. 노드를 클릭해 펼치면 시스템→소스, 도메인→클래스, 클래스→인스턴스로 드릴다운합니다. 엣지 굵기 = provenance 유입 건수.</p>
  <div class="bar">
    <button class="btn" id="expP">시스템 모두 펼치기</button>
    <button class="btn" id="expD">도메인 모두 펼치기</button>
    <button class="btn" id="collapse">모두 접기</button>
    <span class="search"><input id="q" type="search" placeholder="소스·클래스 검색 후 Enter" autocomplete="off"></span>
    <span><span class="sw" style="background:var(--accent)"></span><b>클래스</b> · 도메인=채운 노드</span>
    <span>소스 주기:
      <span class="cadsw" style="background:var(--cad-daily)"></span>d
      <span class="cadsw" style="background:var(--cad-weekly)"></span>w
      <span class="cadsw" style="background:var(--cad-monthly)"></span>m
      <span class="cadsw" style="background:var(--cad-adhoc)"></span>a</span>
    <span id="stat" style="margin-left:auto"></span>
  </div>
</header>

<div class="wrap" id="wrap">
  <div class="stage" id="stage"><svg class="edges" id="edges"></svg></div>
  <div class="ctrls"><button id="zin">＋</button><button id="zout">－</button><button id="fit" title="전체 보기">⤢</button></div>
  <div class="hint">드래그=이동 · 휠=확대/축소 · 노드 클릭=펼치기/접기 · 호버=계보 강조</div>
</div>

<script>
(function(){
  "use strict";
  const DATA=JSON.parse(document.getElementById("datalake-data").textContent||"{}");
  const sources=DATA.sources||[], classes=DATA.classes||[], instances=DATA.instances||[];
  const cssv=(v)=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const domColor=(d)=>cssv("--d-"+(d||"org"))||cssv("--ink-faint");
  const DOMAINS=["business","tech","ecosystem","market","comms","ops","sources","strategy","org"];
  const N_TOP=6;

  const srcById={}; sources.forEach(s=>srcById[s.id]=s);
  const clsByName={}; classes.forEach(c=>clsByName[c.name]=c);
  const instById={}; instances.forEach(i=>instById[i.id]=i);
  const domainOf=(cls)=>{const c=clsByName[cls]; return (c&&c.domain)||"org";};
  const provOf=(sid)=>{const i=sid.indexOf("/"); return i>=0?sid.slice(0,i):sid;};

  const scCount={}; const clsInsts={}; classes.forEach(c=>clsInsts[c.name]=[]);
  instances.forEach(i=>{
    (clsInsts[i.class]=clsInsts[i.class]||[]).push(i.id);
    (i.sourcedFrom||[]).forEach(sid=>{const k=sid+"|"+i.class; scCount[k]=(scCount[k]||0)+1;});
  });
  Object.values(clsInsts).forEach(a=>a.sort((x,y)=>{const A=instById[x],B=instById[y];return (B.lastConfirmedAt||"").localeCompare(A.lastConfirmedAt||"")||A.id.localeCompare(B.id);}));
  const triples=Object.keys(scCount).map(k=>{const [sid,cls]=k.split("|"); return [sid,cls,scCount[k]];});

  const sourcesByProv={}; sources.forEach(s=>{(sourcesByProv[provOf(s.id)]=sourcesByProv[provOf(s.id)]||[]).push(s);});
  const srcInflow={}; sources.forEach(s=>srcInflow[s.id]=0);
  triples.forEach(([sid,,c])=>{ if(sid in srcInflow) srcInflow[sid]+=c; });
  const provInflow={}; Object.keys(sourcesByProv).forEach(p=>provInflow[p]=sourcesByProv[p].reduce((a,s)=>a+srcInflow[s.id],0));
  const domInflow={}; DOMAINS.forEach(d=>domInflow[d]=0);
  triples.forEach(([,cls,c])=>{const d=domainOf(cls); domInflow[d]=(domInflow[d]||0)+c;});
  const domInstanceCount={}; DOMAINS.forEach(d=>domInstanceCount[d]=0);
  instances.forEach(i=>{const d=domainOf(i.class); domInstanceCount[d]=(domInstanceCount[d]||0)+1;});
  const domsPresent=DOMAINS.filter(d=>classes.some(c=>c.domain===d));
  const clsInflow={}; classes.forEach(c=>clsInflow[c.name]=0);
  triples.forEach(([,cls,c])=>{clsInflow[cls]=(clsInflow[cls]||0)+c;});

  const expP=new Set(), expD=new Set(), showInst=new Set(), fullCls=new Set();

  const X={prov:24, src:190, type:560, inst:830};
  const W={prov:150, src:300, type:230, inst:300};
  const HEAD=26;
  let nodes=[], edges=[], NB={}, ADJ={}, bounds={w:1200,h:700};

  function layout(){
    nodes=[]; edges=[]; NB={};
    const add=(n)=>{nodes.push(n); NB[n.id]=n; return n;};

    let ty=HEAD+6;
    const provOrder=Object.keys(sourcesByProv).sort((a,b)=>provInflow[b]-provInflow[a]||a.localeCompare(b));
    domsPresent.sort((a,b)=>DOMAINS.indexOf(a)-DOMAINS.indexOf(b));
    domsPresent.forEach(dom=>{
      if(expD.has(dom)){
        const cls=classes.filter(c=>c.domain===dom).sort((a,b)=>clsInflow[b.name]-clsInflow[a.name]||a.name.localeCompare(b.name));
        cls.forEach(c=>{
          const blockTop=ty;
          if(showInst.has(c.name)){
            const all=clsInsts[c.name]||[];
            const shown=fullCls.has(c.name)?all:all.slice(0,N_TOP);
            shown.forEach(id=>{const it=instById[id]; add({id:"i:"+id,kind:"inst",label:it.label||id,sub:id,x:X.inst,y:ty,w:W.inst,h:24,dom});ty+=30;});
            if(!fullCls.has(c.name)&&all.length>N_TOP){ add({id:"m:"+c.name,kind:"more",label:"+"+(all.length-N_TOP)+" 더보기",x:X.inst,y:ty,w:W.inst,h:24,cls:c.name}); ty+=30; }
          }
          const cy=showInst.has(c.name)? (blockTop+ty-30)/2 : ty;
          add({id:"c:"+c.name,kind:"klass",label:c.name,sub:c.domain,x:X.type,y:Math.max(HEAD+6,cy),w:W.type,h:32,dom,cls:c.name,count:clsInsts[c.name].length,car:(clsInsts[c.name].length?(showInst.has(c.name)?"▾":"▸"):"")});
          if(showInst.has(c.name)){
            const all=clsInsts[c.name]||[]; const shown=fullCls.has(c.name)?all:all.slice(0,N_TOP);
            shown.forEach(id=>edges.push({from:"c:"+c.name,to:"i:"+id,w:0.7,kind:"ci"}));
            if(!fullCls.has(c.name)&&all.length>N_TOP) edges.push({from:"c:"+c.name,to:"m:"+c.name,w:0.7,kind:"ci",dash:true});
          } else ty+=38;
        });
      } else {
        add({id:"d:"+dom,kind:"domain",label:dom,sub:classes.filter(c=>c.domain===dom).length+" cls · "+domInflow[dom]+" inflow",x:X.type,y:ty,w:W.type,h:34,dom,car:"▸",count:domInstanceCount[dom]});
        ty+=44;
      }
    });

    let sy=HEAD+6;
    provOrder.forEach(p=>{
      if(expP.has(p)){
        const list=sourcesByProv[p].slice().sort((a,b)=>srcInflow[b.id]-srcInflow[a.id]||a.id.localeCompare(b.id));
        const top=sy;
        list.forEach(s=>{ add({id:"s:"+s.id,kind:"source",label:s.id.split("/").slice(1).join("/")||s.id,sub:s.kind+(s.cadence?(" · "+s.cadence):""),x:X.src,y:sy,w:W.src,h:32,cad:s.cadence?("--cad-"+s.cadence):null,srcId:s.id}); sy+=40; });
        const py=(top+sy-40)/2;
        add({id:"p:"+p,kind:"provider",label:p,sub:list.length+" src",x:X.prov,y:Math.max(HEAD+6,py),w:W.prov,h:32,prov:p,car:"▾"});
        list.forEach(s=>edges.push({from:"p:"+p,to:"s:"+s.id,w:0.6,kind:"ps"}));
      } else {
        add({id:"p:"+p,kind:"provider",label:p,sub:sourcesByProv[p].length+" src · "+provInflow[p]+" inflow",x:X.prov,y:sy,w:W.prov,h:32,prov:p,car:"▸"});
        sy+=44;
      }
    });

    const agg={};
    triples.forEach(([sid,cls,cnt])=>{
      const p=provOf(sid);
      const left = expP.has(p)? ("s:"+sid) : ("p:"+p);
      const dom=domainOf(cls);
      const right = expD.has(dom)? ("c:"+cls) : ("d:"+dom);
      if(!NB[left]||!NB[right]) return;
      const k=left+">"+right; agg[k]=(agg[k]||0)+cnt;
    });
    Object.keys(agg).forEach(k=>{const [a,b]=k.split(">"); edges.push({from:a,to:b,w:Math.min(7,0.8+Math.log(1+agg[k])),kind:"flow",count:agg[k]});});

    bounds={w:X.inst+W.inst+50, h:Math.max(ty,sy)+30};
    ADJ={}; nodes.forEach(n=>ADJ[n.id]=[]);
    edges.forEach((e,idx)=>{ if(ADJ[e.from]&&ADJ[e.to]){ADJ[e.from].push({to:e.to,idx});ADJ[e.to].push({to:e.from,idx});} });
  }

  const stage=document.getElementById("stage"), svg=document.getElementById("edges");
  function render(){
    stage.querySelectorAll(".node,.colhdr").forEach(n=>n.remove()); svg.innerHTML="";
    svg.setAttribute("width",bounds.w); svg.setAttribute("height",bounds.h);
    [["prov","원 시스템"],["src","소스"],["type","도메인 / 클래스"],["inst","인스턴스"]].forEach(([key,t])=>{const h=document.createElement("div");h.className="colhdr";h.textContent=t;h.style.left=X[key]+"px";h.style.width=W[key]+"px";stage.appendChild(h);});
    const ef=document.createDocumentFragment();
    edges.forEach((e)=>{const a=NB[e.from],b=NB[e.to]; if(!a||!b)return;
      const x1=a.x+a.w,y1=a.y+a.h/2,x2=b.x,y2=b.y+b.h/2,mx=(x1+x2)/2;
      const p=document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d",`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`); p.setAttribute("fill","none");
      p.setAttribute("stroke", e.kind==="flow"? domColor(b.dom): cssv("--edge"));
      p.setAttribute("stroke-width",e.w); p.setAttribute("opacity", e.kind==="flow"?0.5:0.32);
      if(e.dash)p.setAttribute("stroke-dasharray","4,4"); e._el=p; ef.appendChild(p);
    });
    svg.appendChild(ef);
    const nf=document.createDocumentFragment();
    nodes.forEach(n=>{
      const d=document.createElement("div"); d.className="node "+n.kind;
      d.style.left=n.x+"px"; d.style.top=n.y+"px"; d.style.width=n.w+"px"; d.style.minHeight=n.h+"px";
      if(n.kind==="source"&&n.cad)d.style.borderLeftColor=cssv(n.cad);
      if(n.kind==="klass")d.style.borderLeftColor=domColor(n.dom);
      if(n.kind==="inst")d.style.borderLeft="3px solid "+domColor(n.dom);
      if(n.kind==="domain")d.style.background=domColor(n.dom);
      if(n.car){const c=document.createElement("span");c.className="car";c.textContent=n.car;d.appendChild(c);}
      const bd=document.createElement("div");bd.className="body";
      const lab=document.createElement("div");lab.className="lab";lab.textContent=n.label;bd.appendChild(lab);
      if(n.sub){const s=document.createElement("div");s.className="sub";s.textContent=n.sub;bd.appendChild(s);}
      d.appendChild(bd);
      if(n.count!=null&&n.kind!=="more"){const pl=document.createElement("span");pl.className="pill";pl.textContent=n.count;d.appendChild(pl);}
      d.title=(n.sub?n.sub+"\n":"")+n.label;
      n._el=d;
      d.onclick=(ev)=>{ev.stopPropagation(); onClick(n);};
      d.addEventListener("mouseenter",()=>hi(n.id));
      d.addEventListener("mouseleave",clearHi);
      nf.appendChild(d);
    });
    stage.appendChild(nf);
    document.getElementById("stat").textContent=nodes.length+" 노드 · "+edges.length+" 엣지";
  }
  function refresh(){ layout(); render(); }

  function onClick(n){
    if(n.kind==="provider"){ if(n.prov)(expP.has(n.prov)?expP.delete(n.prov):expP.add(n.prov)); refresh(); }
    else if(n.kind==="domain"){ expD.add(n.dom); refresh(); }
    else if(n.kind==="klass"){ if(!clsInsts[n.cls].length)return; if(showInst.has(n.cls)){showInst.delete(n.cls);fullCls.delete(n.cls);}else showInst.add(n.cls); refresh(); }
    else if(n.kind==="more"){ fullCls.add(n.cls); refresh(); }
  }

  function hi(id){
    const seen=new Set([id]),ke=new Set(),st=[id];
    while(st.length){const c=st.pop();(ADJ[c]||[]).forEach(({to,idx})=>{ke.add(idx);if(!seen.has(to)){seen.add(to);st.push(to);}});}
    nodes.forEach(n=>{n._el.classList.toggle("dim",!seen.has(n.id));n._el.classList.toggle("hot",n.id===id);});
    edges.forEach((e,idx)=>{if(e._el){const on=ke.has(idx);e._el.style.opacity=on?(e.kind==="flow"?0.9:0.6):0.04;e._el.style.strokeWidth=on?e.w*(e.kind==="flow"?1.4:1):e.w;}});
  }
  function clearHi(){nodes.forEach(n=>n._el.classList.remove("dim","hot"));edges.forEach(e=>{if(e._el){e._el.style.opacity=e.kind==="flow"?0.5:0.32;e._el.style.strokeWidth=e.w;}});}

  let tx=0,ty2=0,k=1;
  const apply=()=>stage.style.transform=`translate(${tx}px,${ty2}px) scale(${k})`;
  function fit(){const wrap=document.getElementById("wrap"),W2=wrap.clientWidth,H=wrap.clientHeight;k=Math.min(W2/bounds.w,H/bounds.h,1)*0.97;if(!isFinite(k)||k<=0)k=.6;tx=Math.max(10,(W2-bounds.w*k)/2);ty2=14;apply();}
  const wrap=document.getElementById("wrap");
  wrap.addEventListener("wheel",(e)=>{e.preventDefault();const r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,f=e.deltaY<0?1.1:1/1.1,nk=Math.max(.12,Math.min(3,k*f));tx=mx-(mx-tx)*(nk/k);ty2=my-(my-ty2)*(nk/k);k=nk;apply();},{passive:false});
  let dg=false,lx=0,ly=0;
  wrap.addEventListener("mousedown",(e)=>{if(e.target.closest(".node"))return;dg=true;wrap.classList.add("grabbing");lx=e.clientX;ly=e.clientY;});
  window.addEventListener("mousemove",(e)=>{if(!dg)return;tx+=e.clientX-lx;ty2+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apply();});
  window.addEventListener("mouseup",()=>{dg=false;wrap.classList.remove("grabbing");});
  document.getElementById("zin").onclick=()=>{k=Math.min(3,k*1.2);apply();};
  document.getElementById("zout").onclick=()=>{k=Math.max(.12,k/1.2);apply();};
  document.getElementById("fit").onclick=fit;
  document.getElementById("expP").onclick=()=>{Object.keys(sourcesByProv).forEach(p=>expP.add(p));refresh();fit();};
  document.getElementById("expD").onclick=()=>{domsPresent.forEach(d=>expD.add(d));refresh();fit();};
  document.getElementById("collapse").onclick=()=>{expP.clear();expD.clear();showInst.clear();fullCls.clear();refresh();fit();};
  document.getElementById("q").addEventListener("keydown",(e)=>{
    if(e.key!=="Enter")return; const t=e.target.value.trim().toLowerCase(); if(!t)return;
    let m=sources.find(s=>s.id.toLowerCase().includes(t));
    if(m){ expP.add(provOf(m.id)); refresh(); if(NB["s:"+m.id])hi("s:"+m.id); return; }
    let c=classes.find(x=>x.name.toLowerCase().includes(t));
    if(c){ expD.add(c.domain); refresh(); if(NB["c:"+c.name])hi("c:"+c.name); }
  });

  if(!instances.length){document.getElementById("stat").textContent="데이터 미임베드 — tools/build_datalake_data.py 실행 필요";}
  refresh(); fit();
})();
</script>
</body>
</html>
