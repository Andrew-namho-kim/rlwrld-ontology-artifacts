<meta charset="utf-8">
<title>RLWRLD Ontology — Knowledge Graph</title>
<style>
  :root{
    --bg:#f5f7fa; --surface:#ffffff; --surface-2:#eef1f6;
    --ink:#141d2b; --ink-soft:#54627a; --ink-faint:#8b98ad; --line:#d6dce6;
    --accent:#245fd0;
    --edge:#c2cad6; --edge-isa:#d8dee8;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    --font-mono:ui-monospace,"SF Mono","Menlo","Consolas",monospace;
    /* domain categorical palette */
    --d-business:#3b74e8; --d-tech:#12a69c; --d-ecosystem:#e07b2f;
    --d-market:#c65ca0; --d-comms:#8b62d6; --d-ops:#6f7d90;
    --d-sources:#3fa45f; --d-strategy:#db4b4b; --d-org:#c99a1e;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0c1119; --surface:#141c27; --surface-2:#1b2430;
      --ink:#e9eef5; --ink-soft:#97a5ba; --ink-faint:#6a788d; --line:#28323f;
      --accent:#6fa4ff; --edge:#38424f; --edge-isa:#2b3542;
      --d-business:#5b90ff; --d-tech:#33c2b8; --d-ecosystem:#f0965a;
      --d-market:#e07bbd; --d-comms:#a684ee; --d-ops:#8b99ac;
      --d-sources:#54c47c; --d-strategy:#f16a6a; --d-org:#e6bd4a;
    }
  }
  :root[data-theme="light"]{
    --bg:#f5f7fa;--surface:#ffffff;--surface-2:#eef1f6;--ink:#141d2b;--ink-soft:#54627a;
    --ink-faint:#8b98ad;--line:#d6dce6;--accent:#245fd0;--edge:#c2cad6;--edge-isa:#d8dee8;
    --d-business:#3b74e8;--d-tech:#12a69c;--d-ecosystem:#e07b2f;--d-market:#c65ca0;
    --d-comms:#8b62d6;--d-ops:#6f7d90;--d-sources:#3fa45f;--d-strategy:#db4b4b;--d-org:#c99a1e;
  }
  :root[data-theme="dark"]{
    --bg:#0c1119;--surface:#141c27;--surface-2:#1b2430;--ink:#e9eef5;--ink-soft:#97a5ba;
    --ink-faint:#6a788d;--line:#28323f;--accent:#6fa4ff;--edge:#38424f;--edge-isa:#2b3542;
    --d-business:#5b90ff;--d-tech:#33c2b8;--d-ecosystem:#f0965a;--d-market:#e07bbd;
    --d-comms:#a684ee;--d-ops:#8b99ac;--d-sources:#54c47c;--d-strategy:#f16a6a;--d-org:#e6bd4a;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  #app{position:fixed;inset:0;display:flex;flex-direction:column}

  header{padding:14px 18px 12px;border-bottom:1px solid var(--line);background:var(--surface);z-index:5}
  .htop{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  h1{font-size:1.12rem;font-weight:750;letter-spacing:-.02em;margin:0}
  .sub{font-size:.82rem;color:var(--ink-soft)}
  .kbd{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-faint)}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:11px}
  .toggle{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px}
  .toggle button{border:none;background:none;font:inherit;font-size:.82rem;font-weight:600;color:var(--ink-soft);
    padding:6px 13px;border-radius:6px;cursor:pointer}
  .toggle button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);font:inherit;font-size:.8rem;
    padding:6px 12px;border-radius:8px;cursor:pointer}
  .btn:hover{color:var(--ink)}
  .count{font-size:.78rem;color:var(--ink-faint);font-family:var(--font-mono)}

  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:11px}
  .lg{display:flex;align-items:center;gap:6px;font-size:.76rem;color:var(--ink-soft);cursor:pointer;
    user-select:none;padding:2px 4px;border-radius:5px}
  .lg:hover{background:var(--surface-2)}
  .lg.off{opacity:.35}
  .sw{width:11px;height:11px;border-radius:50%;flex:none}

  .stage-wrap{position:relative;flex:1;min-height:0}
  canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
  canvas.grabbing{cursor:grabbing}

  #detail{position:absolute;top:14px;right:14px;width:290px;max-width:calc(100vw - 28px);
    background:var(--surface);border:1px solid var(--line);border-radius:13px;
    box-shadow:0 8px 30px rgba(0,0,0,.18);padding:15px 16px;font-size:.85rem;display:none;z-index:6}
  #detail.show{display:block}
  #detail .dclose{position:absolute;top:10px;right:12px;border:none;background:none;color:var(--ink-faint);
    font-size:1.1rem;cursor:pointer;line-height:1}
  #detail .dkind{font-family:var(--font-mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;
    margin-bottom:5px}
  #detail h3{margin:0 0 3px;font-size:1.02rem;font-weight:750;letter-spacing:-.01em;padding-right:16px}
  #detail .ddesc{color:var(--ink-soft);font-size:.8rem;margin-bottom:10px}
  #detail .rel-h{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;
    color:var(--ink-faint);margin:11px 0 5px}
  #detail .rel{display:flex;gap:7px;align-items:baseline;font-size:.8rem;padding:3px 0}
  #detail .rel .rn{font-family:var(--font-mono);color:var(--accent);flex:none}
  #detail .rel .rt{color:var(--ink)}
  #detail .rel .ri{color:var(--ink-faint);font-family:var(--font-mono);font-size:.72rem}

  .hint{position:absolute;left:14px;bottom:12px;font-size:.74rem;color:var(--ink-faint);
    background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:6px 10px;z-index:6}

  /* ---- tabs ---- */
  .tabs{display:inline-flex;gap:2px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px}
  .tab{border:none;background:none;font:inherit;font-size:.84rem;font-weight:650;color:var(--ink-soft);
    padding:6px 15px;border-radius:6px;cursor:pointer}
  .tab.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}

  /* ---- views ---- */
  .view{flex:1;min-height:0;display:none;flex-direction:column;overflow:hidden}
  .view.on{display:flex}
  .subbar{padding:12px 18px;border-bottom:1px solid var(--line);background:var(--surface);z-index:4}
  .subbar .controls{margin-top:0}
  .subbar .legend{margin-top:10px}

  /* ---- cli console ---- */
  .cli{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--bg)}
  .cli-scroll{flex:1;min-height:0;overflow-y:auto;padding:22px 20px 12px;
    font-family:var(--font-mono);font-size:.82rem;line-height:1.6;color:var(--ink)}
  .cli-entry{margin:0 0 20px;max-width:880px}
  .cli-cmd{color:var(--ink-soft);white-space:pre-wrap;word-break:break-word}
  .cli-cmd .p{color:var(--accent);font-weight:700;margin-right:8px}
  .cli-res{margin-top:9px}
  .r-line{color:var(--ink)} .r-line b{font-variant-numeric:tabular-nums}
  .r-muted{color:var(--ink-faint)}
  .r-head{color:var(--ink-faint);font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;margin:0 0 9px}
  .cli code{font-family:var(--font-mono);background:var(--surface-2);border:1px solid var(--line);
    border-radius:5px;padding:1px 6px;font-size:.92em;color:var(--ink)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);
    border-radius:999px;padding:4px 12px;font-size:.78rem;color:var(--ink);cursor:pointer;
    font-family:var(--font-sans);transition:border-color .12s,transform .12s}
  .chip:hover{border-color:var(--accent);transform:translateY(-1px)}
  .chip .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .chip.ex{font-family:var(--font-mono);color:var(--ink-soft)}
  .node-card{border:1px solid var(--line);border-radius:13px;background:var(--surface);padding:15px 17px;max-width:580px}
  .nc-kind{font-family:var(--font-mono);font-size:.64rem;letter-spacing:.09em;text-transform:uppercase;margin-bottom:5px}
  .node-card h4{margin:0 0 3px;font-size:1.05rem;font-family:var(--font-sans);font-weight:750;letter-spacing:-.01em}
  .nc-desc{color:var(--ink-soft);font-size:.82rem;font-family:var(--font-sans);margin-bottom:4px}
  .rel-h{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;
    color:var(--ink-faint);margin:12px 0 5px}
  .rel-row{display:flex;gap:8px;align-items:baseline;padding:3px 0;flex-wrap:wrap}
  .rel-row .rn{color:var(--accent);flex:none;font-size:.78rem}
  .rel-row .rt{color:var(--ink);cursor:pointer;border-bottom:1px dotted var(--ink-faint)}
  .rel-row .rt:hover{color:var(--accent);border-bottom-color:var(--accent)}
  .rel-row .rc{color:var(--ink-faint);font-size:.74rem}
  .gobtn{margin-top:14px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-soft);
    font-family:var(--font-sans);font-size:.76rem;padding:6px 12px;border-radius:8px;cursor:pointer}
  .gobtn:hover{color:var(--ink);border-color:var(--accent)}
  .stat-rows{display:flex;flex-direction:column;gap:6px;max-width:470px}
  .stat-row{display:grid;grid-template-columns:120px 1fr 42px;align-items:center;gap:10px}
  .stat-name{font-family:var(--font-sans);font-size:.8rem;color:var(--ink);cursor:pointer}
  .stat-name:hover{color:var(--accent)}
  .stat-row .bar{height:9px;border-radius:5px;min-width:3px}
  .stat-num{font-variant-numeric:tabular-nums;text-align:right;color:var(--ink-soft);font-size:.8rem}
  .path{display:flex;flex-wrap:wrap;align-items:center;gap:8px;max-width:660px}
  .path-rel{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-faint)}
  .help{display:flex;flex-direction:column;gap:7px;max-width:580px}
  .help-row{display:grid;grid-template-columns:210px 1fr;gap:12px;align-items:baseline}
  .help-row span{font-family:var(--font-sans);font-size:.82rem;color:var(--ink-soft)}
  .welcome code{cursor:default}

  @media (max-width:640px){
    #detail{width:auto;left:14px;right:14px} .hint{display:none}
    .htop .sub{display:none}
    .stat-row{grid-template-columns:88px 1fr 34px}
    .help-row{grid-template-columns:1fr}
  }
  #view-lineage{padding:0}
  #lf-frame{width:100%;height:100%;border:0;flex:1;background:var(--bg)}
</style>

<div id="app">
  <header>
    <div class="htop">
      <h1>RLWRLD 온톨로지 · 지식 그래프</h1>
      <span class="sub">클래스와 인스턴스가 관계로 엮인 망. <span class="count" id="cnt"></span></span>
      <div class="toggle" id="modeSwitch" style="margin-left:auto">
        <button data-mode="graph" class="on">지식 그래프</button>
        <button data-mode="lineage">데이터 계보 흐름</button>
      </div>
    </div>
  </header>

  <section id="view-graph" class="view on">
    <div class="subbar">
      <div class="controls">
        <div class="toggle" id="viewToggle">
          <button data-v="schema" class="on">클래스 관계 (스키마)</button>
          <button data-v="instance">실제 데이터 (인스턴스)</button>
        </div>
        <button class="btn" id="resetBtn">보기 초기화</button>
        <label class="btn" id="typeToggleWrap" style="display:inline-flex;align-items:center;gap:7px;cursor:pointer">
          <input type="checkbox" id="typeToggle" style="margin:0"> 타입(클래스) 노드 표시
        </label>
        <label class="btn" id="strategyToggleWrap" style="display:inline-flex;align-items:center;gap:7px;cursor:pointer">
          <input type="checkbox" id="strategyToggle" style="margin:0"> Decision/Action 펼치기
        </label>
        <span class="kbd">드래그로 이동 · 휠로 확대 · 노드 클릭 시 상세</span>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="stage-wrap">
      <canvas id="cv"></canvas>
      <div id="detail">
        <button class="dclose" id="dclose" aria-label="닫기">×</button>
        <div class="dkind" id="dkind"></div>
        <h3 id="dname"></h3>
        <div class="ddesc" id="ddesc"></div>
        <div id="drels"></div>
      </div>
      <div class="hint" id="hint">화살표 = 관계(동사) · 점선 = is-a/타입 · 버블 클수록 연결 많음 · "타입 노드 표시" 켜면 ◆클래스 부모 등장</div>
    </div>
  </section>
  <section id="view-lineage" class="view">
    <iframe id="lf-frame" title="Data Lineage Flow"></iframe>
  </section>
</div>

"desc":"제안됨"},{"id":"ai-392","class":"ActionItem","label":"데이터 정제(큐레이션) RD 실사용 내용을 준수·광훈이 상의해 정리","desc":"제안됨"},{"id":"ai-393","class":"ActionItem","label":"학습 preset 값(경화가 학습중 모델서 추출한 값) 활용 방안을 광훈과 논의","desc":"제안됨"},{"id":"ai-394","class":"ActionItem","label":"로봇 추가(RRC 규격) 가이드 제공","desc":"제안됨"},{"id":"ai-395","class":"ActionItem","label":"RX팀 인풋을 제품화 과정에 고려·반영","desc":"제안됨"},{"id":"ai-396","class":"ActionItem","label":"상용화 모듈(Workflow Orchestration·Fleet·OTA) 고객 요구·기존 Product 관점 자료 수집 및 하이레벨 요구사항 정리","desc":"제안됨"},{"id":"ai-397","class":"ActionItem","label":"증강 단계 UI 요소 마련 및 구체적 데이터 증강 방식 추후 추가","desc":"진행중"},{"id":"ai-398","class":"ActionItem","label":"정제 단계에 에피소드 직접 선택 및 반영 비중 지정 기능 추가","desc":"진행중"},{"id":"ai-399","class":"ActionItem","label":"여러 모델 동시 학습 흐름 추가 및 모델별 Preset 등록 통로 구성","desc":"진행중"},{"id":"ai-400","class":"ActionItem","label":"모델별 학습 Preset 제공 (등록 통로에 반영)","desc":"제안됨"},{"id":"ai-401","class":"ActionItem","label":"평가(대략적 평가) 상위 N개 모델 replay 기반 평가 및 미추천 사유 확인 흐름 UI 구성","desc":"진행중"},{"id":"ai-402","class":"ActionItem","label":"실제 로봇 평가용 task 단위 리더보드(모델·데이터셋·설정별 성능 비교) 대시보드 형태 검토","desc":"제안됨"},{"id":"ai-403","class":"ActionItem","label":"학습 UI 구성 확정 후 데이터 예시 및 표현(문구) 개선","desc":"제안됨"},{"id":"ai-404","class":"ActionItem","label":"RLDX 데모/파인튜닝 실험 조합 및 노션 문서 취합해 fine-tuning recipe 작성","desc":"진행중"},{"id":"dec-biz-001","class":"Decision","label":"파스토 물류 자동화 실증 범위 축소 접근 결정","desc":"전면 자동화 대신 특정 고객사·제한된 박스 사이즈로 범위를 좁혀 검수·피킹 자동화를 실증하기로 함"},{"id":"dec-biz-002","class":"Decision","label":"8월 로봇 데모 시나리오 1차 방향 설정","desc":"8월 알렉스 핸드 데모를 우유 붓기·피규어 진열·붓펜 글씨 3개 필수 + 젤리 글자 만들기는 옵션(고도화)으로 구성"},{"id":"dec-biz-003","class":"Decision","label":"우유 붓기 데모 투명컵 진행 결정","desc":"투명컵 RGB 세그멘테이션 인식이 가능함을 확인하고 우유 붓기 데모를 투명컵으로 진행하기로 함"},{"id":"dec-biz-004","class":"Decision","label":"데모 구현 방식 - 모델 기반 후 러닝 기반 발전","desc":"8월 데모는 로봇팀 중심 모델 기반으로 구현하되, 로봇팀+인텔리전스팀이 러닝 기반으로 발전시키기로 함"},{"id":"dec-biz-005","class":"Decision","label":"만도 공장 우선 적용 과제 선정","desc":"노조 반감 최소화를 위해 인력 대체가 아닌 작업자 기피 단순반복 업무(Base Assy 입하·바코드 매칭) 보조를 우선 과제로 설정"},{"id":"dec-biz-006","class":"Decision","label":"만도 로봇 타입 - 휠베이스 양팔 로봇 채택","desc":"기술적 안정성과 노조 저항감을 고려해 이족보행 대신 휠 베이스 기반 모바일 베이스 양팔 로봇으로 실증하기로 함"},{"id":"dec-biz-007","class":"Decision","label":"시나노켄시-RLWRLD 로봇핸드 공동개발 방향 합의","desc":"시나노켄시의 소형 3지 액추에이터 모터 기술과 RLWRLD의 5-finger 핸드 기술을 결합해 공동 개발하는 방향으로 합의"},{"id":"dec-biz-008","class":"Decision","label":"로봇 핸드 PoC 검토 기준을 Option 3 사양으로 확정","desc":"Maxon 협업 로봇 핸드 PoC의 목표 스펙을 RLWRLD Option 3 사양으로 재확인하고, 손가락 길이를 핵심 제약으로 고정했다."},{"id":"dec-biz-009","class":"Decision","label":"칩 벤더를 ST로 고정하지 않고 복수 옵션 비교 검토","desc":"MCU/칩 벤더를 ST에 묶지 않고 TI 등 대안을 포함해 복수 옵션을 비교 검토하기로 결정."},{"id":"dec-biz-010","class":"Decision","label":"PoC 단계에서 CANopen 적용 허용","desc":"장기적으로 CAN FD가 유력하더라도 초기 PoC에서는 구현 난이도를 낮추기 위해 CANopen 적용을 허용하기로 결정."},{"id":"dec-biz-011","class":"Decision","label":"PoC에서 카탈로그 외 신규 모터/샘플 및 대형 보드 사용 허용","desc":"양산형에 가까운 구조 탐색을 위해 off-the-shelf 외 신규 모터/샘플도 테스트하고, PoC 단계에서는 기존/큰 보드 사용과 form factor 제약 완화를 허용."},{"id":"dec-biz-012","class":"Decision","label":"MSRA 협업 첫 데모 task로 Candidate 1(전구 소켓 작업) 선정","desc":"MSR과의 RL+VLA 협업에서 3개 후보 중 양손 조작 활용이 가능한 Candidate 1(전구 소켓 작업)로 시작하는 데 합의."},{"id":"dec-biz-013","class":"Decision","label":"DexBench 벤치마크 태스크 리스트 13개로 정리 및 파이널라이즈","desc":"초기 15개 태스크를 용재 피드백 반영해 13개로 정리하고, 난이도별 레벨 체계로 발전시키며 다음 금요일까지 1차 확정하기로 함."},{"id":"dec-biz-014","class":"Decision","label":"태스크 그룹 기반 비즈니스 POC 진행 및 RX/RD 로드맵 정렬","desc":"정리된 태스크 그룹을 기반으로 비즈니스 PoC를 진행하고 RX·RD 팀 로드맵을 동일 프레임워크에 맞춰 정렬하기로 함."},{"id":"dec-biz-015","class":"Decision","label":"벤치마크 데모 영상을 시나리오형 티저로 제작","desc":"개별 작업 영상 대신 하나의 시나리오를 담은 긴 영상/티저로 제작해 G0·S0를 대표하기로 방향 합의."},{"id":"dec-biz-016","class":"Decision","label":"국책과제 그룹별 대표(그룹장) 기관 확정","desc":"WFM은 NC AI, RFM은 리얼월드, 시뮬레이터는 한국자동차연구원, 데이터는 NC AI(임시)로 그룹 대표 기관을 확정함."},{"id":"dec-biz-017","class":"Decision","label":"시뮬레이터 파트 참여기관 확정 (펑션베이+서울대 위탁)","desc":"펑션베이는 참여기관으로, 서울대 이동준 교수는 위탁 형태로 참여시켜 시뮬레이터 파트를 보강하기로 확정함."},{"id":"dec-biz-018","class":"Decision","label":"테스트베드 기업은 수요기업 형태로 참여 결정","desc":"테스트베드 기업들은 컨소시엄 참여기관이 아니라 수요기업 형태로 참여시키기로 결정함."},{"id":"dec-biz-019","class":"Decision","label":"로봇 하드웨어 플랫폼 레인보우 로보틱스 1순위 추진","desc":"데이터셋 일관성과 기술 노하우 확보를 위해 레인보우 로보틱스를 1순위로 추진하고, 로보로스·위로보틱스 등을 대안으로 검토하기로 함."},{"id":"dec-biz-020","class":"Decision","label":"KETI 컨소시엄(IITP 국책과제) 1단계 불참 결정","desc":"KETI 주관 IITP 국책과제 참여 제안에 대해 참여 어려움(불참)을 전달하되, 향후 협력 여지는 지속 유지하기로 함."},{"id":"dec-biz-021","class":"Decision","label":"과기부 과제 실증 범위를 덱스트러스 서브스킬 우선 검증으로 확정","desc":"롱 호라이즌 전체 공정 이전에 덱스트리티가 요구되는 특정 서브스킬(필름 떼어 컨베이어에 올리기)을 우선 검증하고, 연구실 내 모사 환경을 구축해 텔레오퍼레이션 데이터를 수집하기로 함."},{"id":"dec-biz-022","class":"Decision","label":"이마트 대표이사 첫 미팅을 공식 보고 형식으로 진행 결정","desc":"티타임 선제안이 있었으나 대표이사 스타일을 고려해 첫 미팅은 공식 보고 형식으로 진행하기로 하고 3/30 주간 보고 일정을 셋업하기로 함."},{"id":"dec-biz-023","class":"Decision","label":"이마트 접근 전략을 전략 컨설팅형 장기 선투자 관점으로 설정","desc":"단순 PoC 비용 집행 부담을 줄이기 위해 전략 컨설팅 형태의 상위 담론 형성을 병행하고, 단기 수익보다 5년 이상 장기 선투자 관점으로 접근하기로 함."},{"id":"dec-biz-024","class":"Decision","label":"B200 GPU 국책과제 주관기관을 RLWRLD가 맡기로 결정","desc":"B200 GPU 256장 지원 특화모델 과제에서 카이스트 대신 RLWRLD가 주관기관을 맡고 국책과제 경험 부족은 다른 강점으로 보완하는 방향으로 가닥을 잡음."},{"id":"dec-biz-025","class":"Decision","label":"Model Weekly 운영 방식 개편","desc":"Model Weekly 아젠다에 Key Updates from Other Teams(준원 담당)와 Project Progress Review를 추가하기로 함"},{"id":"dec-biz-026","class":"Decision","label":"SK 로보틱스 프로젝트 진행 방식 확정","desc":"전통 컨설팅 대신 공동 문제해결 및 Field Trip 기반 가설검증 방식으로 진행하기로 확정."},{"id":"dec-biz-027","class":"Decision","label":"벤치마킹 대상 지역 확정","desc":"벤치마킹 대상을 중국 심천 로봇 제조·부품 생태계와 미국 서부 AI/로봇 스타트업으로 확정."},{"id":"dec-biz-028","class":"Decision","label":"자료 공유 및 NDA 체결 절차 확정","desc":"RX 분석 데이터·글로벌 동향 자료를 구글드라이브/팀즈로 공유하고, 상호 NDA 체결 후 자료 공유 및 계약 진행하기로 함."},{"id":"dec-biz-029","class":"Decision","label":"Dexterity 벤치마크 학술 협력 방식 합의","desc":"RLWRLD가 Dexterity 분류 가설·문헌 자료를 공유하고 윤명환 교수가 학술적 피드백·아이디어를 제공하는 형태로 협력하기로 협의."},{"id":"dec-biz-030","class":"Decision","label":"택타일 데이터 수집 병렬 전략 채택","desc":"단일 방식 올인을 지양하고 외부구매·아웃소싱·자체수집을 병렬 탐색하며 소량씩 iterative하게 테스트하는 접근으로 합의."},{"id":"dec-biz-031","class":"Decision","label":"외부 데이터 구매 원칙: 상용 라이선스 우선","desc":"외부 데이터는 commercial 라이선스로 사용 가능한 데이터를 우선하고, 업체당 1시간 무료 샘플 테스트 후 필요 시 2차 유상 샘플(10~100시간)을 구매하기로 함."},{"id":"dec-biz-032","class":"Decision","label":"장영재 교수 대형 국책과제 VLM/VLA 파트 전담 확정","desc":"장영재 교수 대형 정부과제에서 VLM/VLA 파트를 신진우 교수가 전담하기로 확정."},{"id":"dec-biz-033","class":"Decision","label":"이마트 Physical AI 도입 긍정 검토 합의","desc":"이마트 현장의 고인건비·고령화 문제 해결을 위해 RLWRLD 피지컬 AI 도입을 긍정적으로 검토하기로 함."},{"id":"dec-biz-034","class":"Decision","label":"이마트-RLWRLD JV 등 협업모델 구축 합의","desc":"투자를 포함한 양사 간 적극적 협업 모델(JV 등)을 구축해 나가기로 합의."},{"id":"dec-biz-035","class":"Decision","label":"S0 백본을 G0 v1.4 8b로 확정","desc":"3b 모델을 새로 만들지 않고 G0 v1.4 8b를 S0 백본으로 사용하기로 결정, G0/S0 모델 라인을 통합."},{"id":"dec-biz-036","class":"Decision","label":"MSRA와 전구 조작 태스크 협업 진행 결정","desc":"Microsoft Research Asia(MSRA)와 협업으로 테이블 전구를 잡아 소켓에 꽂고 돌려 켜는 태스크(알렉스 시뮬레이션)를 진행하기로 함."},{"id":"dec-biz-037","class":"Decision","label":"프로젝트별 임시 조직(프로젝트팀) 구성 결정","desc":"조직 규모 확대에 따라 장기 관점 주요 과제에 집중하기 위한 프로젝트 팀(Tele-op, Human data, Data, RL)을 구성하기로 함."},{"id":"dec-biz-038","class":"Decision","label":"연구실별 국책/공동연구 과제 합의 및 계약 진행","desc":"shin·cho·joo·lim·choi 연구실별 과제 내용이 상호 합의되어 계약을 진행하기로 함."},{"id":"dec-biz-039","class":"Decision","label":"Cube_Box_Box 벤치마크 데이터 V4로 재취득 결정","desc":"1차 수집 데이터의 추론 성능이 좋지 않아 Cube_Box_Box 태스크를 V4로 재취득하기로 함(취득일 미정, 다른 중요 task 수행 후)."},{"id":"dec-biz-040","class":"Decision","label":"나비프라 AMR 연동 ROS2 기반 확정 및 주행 API 권한 개방","desc":"RLWRLD 상부 모듈과 나비프라 AMR을 ROS2 기반으로 연동하고, 나비프라가 이동 제어(V, Omega)·지도 정보 등 주행 API 권한을 개방·제공하기로 합의함."},{"id":"dec-biz-041","class":"Decision","label":"로봇 대여·인수 일정 1월 중순~말 잠정 합의","desc":"1월 중순~말 경 나비프라 로봇을 대여하여 RLWRLD가 인수해가는 일정으로 잠정 합의함."},{"id":"dec-biz-042","class":"Decision","label":"모빌린트가 RLWRLD를 VLA 과제 주관부서(KETI/ETRI)와 연결","desc":"신동주 대표가 KETI·ETRI 담당자와 논의 후 VLA 과제 주관 부서와 RLWRLD를 연결해주기로 결정함."},{"id":"dec-biz-043","class":"Decision","label":"코넥티브-리얼월드 협업 및 ARPA-H 국책과제 공동 지원 합의","desc":"코넥티브의 수술 로봇 하드웨어·데이터와 리얼월드의 로봇 제어 모델을 결합해 수술 보조 시스템을 개발하기로 합의하고, ARPA-H 과제에 컨소시엄으로 공동 지원하기로 함."},{"id":"dec-biz-044","class":"Decision","label":"코넥티브 수술실 3D 데이터 샘플 공유로 학습 유효성 검증","desc":"코넥티브가 보유한 수술실 3D 영상 데이터(연구용 승인본)를 리얼월드에 샘플로 공유하여 학습 유효성을 검증하기로 합의함."},{"id":"dec-biz-045","class":"Decision","label":"RUKA·ORKA·G1 담당자 지정 보류","desc":"RUKA, ORKA, G1 하드웨어 담당자 지정은 경환님 합류 후 결정하기로 하고 그 전까지는 Storm이 택배 수령 등만 임시로 챙기기로 함"},{"id":"dec-biz-046","class":"Decision","label":"AWS와 3대 축 협업 모델 구축 합의","desc":"AWS와 비즈니스(RX컨설팅·GTM)·테크(클라우드 인퍼런스·공동 벤치마크)·인프라(R&D·디플로이먼트) 3대 축의 원팀 협업 프레임워크를 구축하기로 합의."},{"id":"dec-biz-047","class":"Decision","label":"금요일 APJ 미팅 발표 팩 구성 확정","desc":"금요일 AWS APJ 통합 TF 미팅용 발표 자료를 비즈니스·테크·인프라 3대 축 오버럴 협업 프레임워크 장표와 롯데호텔 RX 영문 사례로 구성하기로 함."},{"id":"dec-biz-048","class":"Decision","label":"ARPA-H 2차년도 기관별 R&R 분담 확정","desc":"리얼월드는 핸드 인터랙션·파운데이션 모델 학습·데이터 처리, 로엔서지컬은 시스템 통합·정밀 제어·팔 경로계획, 서울대병원은 공간 제공·데모 시나리오 검토로 역할 분담 확정."},{"id":"dec-biz-049","class":"Decision","label":"11월 데모 하드웨어 플랫폼 로엔 휴머노이드 채택","desc":"11월 데모용 하드웨어로 로엔서지컬이 5월 말까지 완성할 머리-토르소-팔 구조 휴머노이드 플랫폼을 공통 활용하기로 함."},{"id":"dec-biz-050","class":"Decision","label":"데이터 수집 서울대병원 공간 확보 계획","desc":"6월 이후 서울대병원 내 공간(11층 회의실 등)을 확보해 멀티카메라 기반으로 집중 데이터 수집하기로 함."},{"id":"dec-biz-051","class":"Decision","label":"한-독 국책과제 GITCC 공동 참여 추진","desc":"5월 29일 마감인 KIAT 주관 한-독 GITCC 국책과제(5년 100억 규모)에 Fraunhofer IPT와 컨소시엄으로 공동 참여를 적극 추진하기로 함."},{"id":"dec-biz-052","class":"Decision","label":"장기 산업용 로봇 벤치마크 공동개발·GTM 협력","desc":"장기적으로 실제 제조 현장 적용 가능한 산업용 로봇 조작 벤치마크 공동 개발과 Fraunhofer 네트워크 기반 시장 진출 협력을 이어가기로 함."},{"id":"dec-biz-053","class":"Decision","label":"NIPA AX 스프린트 RFP를 RLWRLD 제공 정보 기반으로 작성","desc":"NIPA가 리얼월드 제공 정보를 바탕으로 AX 스프린트(피지컬 AI) 과제의 RFP 요구사항과 목표 기준을 설정하기로 함."},{"id":"dec-biz-054","class":"Decision","label":"수요조사 자료 핵심 내용 위주로 이메일 제출 합의","desc":"정식 수요조사 양식을 쓰되 모든 항목이 아닌 핵심 내용(모델 스펙, 후보 도메인 시나리오) 위주로 작성해 이메일 제출하기로 협의."},{"id":"dec-biz-055","class":"Decision","label":"HL만도와 3월 RX 착수·6월 POC 목표 및 NDA 착수","desc":"양사가 3월 중 RX 프로젝트 착수, 6월 POC 진행을 목표로 하고 NDA 체결 및 실무 논의에 착수하기로 함."},{"id":"dec-biz-056","class":"Decision","label":"ANA 데모 우선 영역을 수화물 pick and place로 선정","desc":"ANA 데모에서 기존 PoC 집행 예산이 있는 수화물(UDL baggage handling) pick and place를 우선 실행 영역으로 선정."},{"id":"dec-biz-057","class":"Decision","label":"MCI 데모 태스크 확정","desc":"MCI 제공 태스크(실린더 테이프 포장/드라이브 기판 조립)로 데모 안 확정."},{"id":"dec-biz-058","class":"Decision","label":"KDDI/LAWSON·Shimadz 데이터 파트너십은 8월 데모 결과 이후 결정","desc":"KDDI/LAWSON SKU 데이터 습득 및 Shimadz 협업 진행 여부는 8월 데모 결과 검토 이후로 결정을 보류."},{"id":"dec-biz-059","class":"Decision","label":"GTC Taipei RLWRLD 부스 참가 확정","desc":"GTC Taipei에 RLWRLD 부스 참가가 확정되고 부스 배정이 완료됨."},{"id":"dec-biz-060","class":"Decision","label":"4/29 NVIDIA 본사팀 방한 미팅 오후 4~5시로 잠정 합의","desc":"4월 29일 NVIDIA 본사팀 방한 미팅 시간을 당초 3~5시에서 오후 4~5시로 조율해 잠정 합의(캘린더 블락 및 내부 확정 필요)."},{"id":"dec-biz-061","class":"Decision","label":"LGE 3D 도면부터 전달받아 Mini PoC·Rx 설계 제안 진행","desc":"LGE 부품 자동화 검토를 위해 우선 3D 도면부터 전달받고, RLWRLD가 이를 활용해 Mini PoC 및 Rx 설계 제안과 샘플 핸들링 테스트를 진행하기로 협의."},{"id":"dec-biz-062","class":"Decision","label":"1단계 데모는 자체 개발 로봇으로 시연","desc":"상용 로봇 구매 대신 자체 개발 로봇으로 1단계 최종 데모를 시연하기로 의견 일치."},{"id":"dec-biz-063","class":"Decision","label":"엔드이펙터는 상용도구 어댑터 우선, 전용도구 단계 개발","desc":"과제 기간 내 복잡한 로봇 핸드 개발은 어렵다고 보고, 1차로 상용 수술도구 어댑터를 개발한 뒤 단계적으로 전용 도구를 개발하는 방향 채택."},{"id":"dec-biz-064","class":"Decision","label":"데모 시나리오·R&R은 차기 워크숍에서 확정","desc":"구체적 데모 시나리오, 기관별 R&R 및 연차별 일정, AI 모델 입출력 데이터 형식은 차기 워크숍에서 확정하기로 함."},{"id":"dec-biz-065","class":"Decision","label":"과제 범위를 스크럽·리트랙션 중심 단계적 접근으로 설정","desc":"수술 전체 자동화는 리스크가 높아, 스크럽·리트랙션 두 영역 중심의 단계적 접근으로 과제 범위를 좁히는 데 의견 일치."},{"id":"dec-biz-066","class":"Decision","label":"비루틴·돌발 상황을 초기 과제 범위에서 제외","desc":"루틴 수술 중심으로 데이터를 수집하고, 비루틴·돌발 상황(약 5~10%)은 초기 과제 범위에서 제외하는 전략 채택."},{"id":"dec-biz-067","class":"Decision","label":"척추측만증 수술 대상 리트랙션 데이터 수집 우선 진행","desc":"장시간(4~8시간) 수술로 자동 리트랙션 수요가 있는 척추측만증 수술을 대상으로 리트랙션 데이터 수집을 우선 진행하기로 함."},{"id":"dec-biz-068","class":"Decision","label":"테스트 로봇은 프로젝티브 로봇 활용, 로봇 핸드는 협업 개발","desc":"수술실 진입 인증을 받은 프로젝티브 개발 로봇을 테스트에 활용하고, 로봇 핸드(엔드이펙터)는 협업으로 개발하는 방향."},{"id":"dec-biz-069","class":"Decision","label":"오네 MP 인덕션 분류에 집중, 피킹·포장 전면 제외","desc":"FT본부(풀필먼트)의 피킹·포장 자동화(Wave 2~3)를 과제 범위에서 전면 제외하고, 오네본부(택배)의 MP 인덕션 분류(바코드 상향 투입) 작업에 역량을 집중하기로 확정."},{"id":"dec-biz-070","class":"Decision","label":"현장진단(RX)과 데이터 파트너십을 단일 계약으로 통합","desc":"현장 진단(RX) 프로세스와 데이터 파트너십 구축을 분리하지 않고 하나의 단일 계약서 체계로 통합 진행하기로 함."},{"id":"dec-biz-071","class":"Decision","label":"신규 MOU에 JV 설립·중장기 로드맵 명시, 브랜드 론칭에 연동 공표","desc":"작년 포괄 MOU보다 구체화하여 2028년 현장 대규모 적용·2029년 JV 설립을 포함한 중장기 로드맵을 신규 MOU에 담고, CJ대한통운 7~8월 신규 기술 브랜드 론칭 일정에 연계해 대외 공표하기로 함."},{"id":"dec-biz-072","class":"Decision","label":"데이터·기술 권리 구조 원칙 정리","desc":"원본 데이터는 CJ대한통운 소유, 가공 데이터는 공동 소유, 외부 반출·수익화는 양사 합의를 전제로 하는 원칙으로 정리."},{"id":"dec-biz-073","class":"Decision","label":"1차 POC 기간·수준 확정, 세부 성능지표는 RX 후 확정","desc":"2026년 7~12월 6개월간 실제 현장 조업 테스트 수준의 POC를 지향하기로 확정하고, 세부 기술 성능 목표치는 착수 직후 약 5주간 RX 현장 진단 후 협의·확정하기로 함."},{"id":"dec-biz-074","class":"Decision","label":"스테이셔너리 환경 PoC로 설정, 12월까지 동영상 결과물","desc":"모바일 매니퓰레이터 대신 스테이셔너리 환경에서 복잡 형상 부품 피킹·플레이스 PoC로 범위를 축소하고, 최종 결과물은 12월까지 동작 시연 동영상으로 설정."},{"id":"dec-biz-075","class":"Decision","label":"3개 작업 중 핀 꽂기 제외, 단순 피킹·홈 끼우기 2개 진행","desc":"3가지 대상 작업 중 힘 제어가 필요한 Fixed scroll 핀 꽂기 작업은 제외하고, Main frame 단순 피킹과 Orbit scroll 홈 끼우기 2가지를 진행하는 방향으로 협의."},{"id":"dec-biz-076","class":"Decision","label":"손 형태 그리퍼 사용 추진(페이로드 2.5kg 한계 내)","desc":"일반 2-Finger 대신 손(Hand) 형태 그리퍼 사용을 추진하되, 현재 상용 손 그리퍼(Tesslo)의 페이로드 약 2.5kg 한계 내에서 PoC를 진행하기로 논의."},{"id":"dec-biz-077","class":"Decision","label":"BGF 제안을 단기 PoC 중심 전략으로 확정","desc":"BGF 경영진 눈높이에 맞춰 중장기 전략보다 인건비 절감·매장 효율화 등 단기 성과를 보여주는 PoC 중심 접근으로 제안 방향을 확정함."},{"id":"dec-biz-078","class":"Decision","label":"3월 중 BGF 식품공장·물류센터 실사 진행 확정","desc":"진천 소재 BGF 식품공장·물류센터를 3월 중 방문해 1인칭 영상·마노 장비로 현장 데이터를 수집하고, 전무급 미팅에서 제안서 초안을 검증·수정하기로 함."},{"id":"dec-biz-079","class":"Decision","label":"SK 프로젝트 종료 후 내부 인력 BGF/푸즈로 전환 배치","desc":"SK 프로젝트 마무리에 맞춰 일규 등 내부 인력을 BGF/푸즈 프로젝트로 단계적으로 전환 배치해 실행력을 확보하기로 함."},{"id":"dec-biz-080","class":"Decision","label":"IITP 월드 파운데이션 모델 선도사업 참여 의사 표명","desc":"340억 규모 IITP 피지컬 AI 월드 파운데이션 모델 선도사업(선행과제)에 로봇 파운데이션 모델(정교한 로봇 손) 분야로 참여 의사를 표명함."},{"id":"dec-biz-081","class":"Decision","label":"동원F&B PoC를 EY와 공동 개발 추진","desc":"동원F&B 식품공장(라인당 12명 중 50% 로봇화, 전국 13개 공장)을 첫 실증 유즈케이스로 EY와 공동 개발 추진하기로 함."},{"id":"dec-biz-082","class":"Decision","label":"EY와 협업 공식화 및 역할 분담 합의","desc":"RLWRLD(모델·데이터·로봇HW·텔레옵·학습가이드) + EY(PM·고객네트워크·AI/디지털트윈 인력·DCS/PLC 연계) 역할 분담에 합의하고, 협업 deck 공동 작성 및 협업 기사 publish를 추진하기로 함."},{"id":"dec-biz-083","class":"Decision","label":"NIPA 국책과제(4/17 마감) 연계 추진","desc":"동원F&B 실증을 과기부/NIPA 과제(2년 30억, 4/17 마감)와 연계 추진하기로 하고, 수락 시 마음AI 협업 제안 정리가 필요함."},{"id":"dec-biz-084","class":"Decision","label":"NVIDIA+AWS+EY+RLWRLD 글로벌 벤치마크 케이스 구축 방향 합의","desc":"양사 모두 보유한 NVIDIA·AWS 글로벌 협업 프레임워크를 활용해 한국에서 Physical AI 벤치마크 케이스를 함께 만들자는 중장기 방향에 초기적으로 합의함."},{"id":"dec-biz-085","class":"Decision","label":"3SECONDZ와 PoC·데이터 협력 추진 및 NDA 우선 체결","desc":"양사가 PoC 및 데이터 비즈니스 협력을 긍정적으로 추진하기로 합의하고, 구체 정보 공유를 위해 NDA를 우선 체결하기로 함."},{"id":"dec-biz-086","class":"Decision","label":"PoC는 로봇 핸드 사용·하이브리드 접근으로 확정","desc":"PoC 핵심은 RLWRLD 정체성인 '로봇 핸드' 사용(그리퍼 배제)이며, 100% 학습 기반일 필요는 없으나 비전/정교조작에는 학습 기반 기술을 반드시 일부 포함하는 하이브리드 방식을 원칙으로 함."},{"id":"dec-biz-087","class":"Decision","label":"본격 PoC 전 프리 PoC(중간 마일스톤) 선행 진행","desc":"본격 PoC에 앞서 3SECONDZ가 단순 제스처·쉬운 Pick&Place, 편의점 상품 진열 등 특정 과제를 단순화해 먼저 개발하는 '프리 PoC' 단계를 갖기로 함."},{"id":"dec-biz-088","class":"Decision","label":"백서에 기여자(Acknowledgement)로 이름 명시하기로 합의","desc":"백서가 95% 완성 단계라 공동 저자 등재는 어려우므로, 코멘트를 통한 수정 제안을 반영하되 기여자(Contributor/Reviewer)로 감사의 글 섹션에 이름을 명시하기로 합의함."},{"id":"dec-biz-089","class":"Decision","label":"Inspire + Franka 조합으로 확정","desc":"Allex sim/real 이외 조합으로 Inspire + Franka 조합을 채택하기로 hk가 결정, 우선순위 상으로 바로 착수."},{"id":"dec-biz-090","class":"Decision","label":"교수님·프로젝트별 전담 담당자 배정","desc":"인텔리전스팀은 스톰/네오, 로봇팀은 제랄드/로이가 전담하고 교수님별(신진우·조민수·주한별·임종우·최성준·김용재) 담당자를 배정, 영입은 hk가 담당하기로 함."},{"id":"dec-biz-091","class":"Decision","label":"RLDX 데모, Qwen 3 기반으로 우선 진행","desc":"최종 모델은 Qwen 3.5 기반이지만 릴리즈 지연으로, 이번주 릴리스되는 Qwen 3 기반으로 데모/실험을 먼저 진행하기로 확정"},{"id":"dec-biz-092","class":"Decision","label":"G0 v1.4 video only 모델로 RL task 우선 적용","desc":"G0 1.4 video+memory가 지연되어 리스크 축소 차원에서 1.4 video only 모델로 먼저 RL task 적용 및 BC 학습을 진행하기로 결정"},{"id":"dec-biz-093","class":"Decision","label":"MSRA 협업 프로젝트 리드를 Simon이 담당","desc":"앞으로 Simon(손선일)이 MSRA 협업 프로젝트를 리드하기로 결정"},{"id":"dec-biz-094","class":"Decision","label":"IKEA 스피커 데모 볼트 삽입은 6D pose estimation+motion planning으로 처리","desc":"IKEA 스피커 데모에서 볼트 넣는 부분은 RL 대신 6D pose estimation + motion planning으로 해결하는 방향으로 진행"},{"id":"dec-biz-095","class":"Decision","label":"G0 3/19 video only(bs=1024) 버전 기준으로 실험 진행","desc":"3월 19일 릴리즈된 G0 목요일 버전(video only, batch size 1024)을 기준으로 데모 실험을 진행하기로 결정"},{"id":"dec-biz-096","class":"Decision","label":"데모 촬영 일정 4월 3일 확정","desc":"RLDX 데모 촬영 일정을 4월 3일로 확정"},{"id":"dec-biz-097","class":"Decision","label":"TopReward 개발 보류(유기)","desc":"TopReward reward modeling 접근을 사실상 보류(유기)하기로 함, 디버깅 필요 상태로 남김"},{"id":"dec-biz-098","class":"Decision","label":"Torque 정보 기반 reward model 접근 시도","desc":"manipulation task progress 모델링에 torque 정보가 유의미할 것으로 보고, torque 기반 reward model 제작 접근을 시도하기로 함"},{"id":"dec-slk-001","class":"Decision","label":"BMW Next PoC 확정 및 PoT(Proof of Technology)로 명칭 변경","desc":"BMW Next PoC가 확정되어 PoT로 명칭을 변경하고 RLDX-1 기반 E2E VLA로 기존 PoC와 동일하게 진행하기로 함. BMW 본부장 요청으로 개발 기간을 단축(중간결과 2월/최종 4~5월, 기존 최종 6월)하고, 견적서 작업에 착수해 8월 초 계약 체결을 목표로 함. 성공기준은 계약서에 미명시하고 연말에 양측 합의로 확정하는 방향을 제안."},{"id":"dec-slk-002","class":"Decision","label":"Honda 생산기술본부 Next Phase PoC 진행 합의","desc":"토치기현 혼다 워크샵 및 사륜차 생산기술부장(임원) 대면 미팅 결과, 어떤 공정을 physical AI로 자동화할지 혼다 내부 논의 후 next phase PoC를 진행하기로 함. 혼다 사내 PoC 추진 검토→대상 공정 압축→RLWRLD와 진행 방식·일정 상담→사내 정식 제안 순으로 진행 예정(대기업 특성상 1~2개월 소요 전망)."},{"id":"dec-slk-003","class":"Decision","label":"KDDI 경유 일본 총무성 국책과제 내정 및 계약 체결 예정","desc":"KDDI를 통해 일본 총무성 국책과제(1천만엔)에 내정. 계약은 KDDI와 7월말~8월 사이 체결 예정이며 매출 1천만엔 발생. 진행 중인 경제산업성 과제와 동일 TASK를 수행하고 파인튜닝은 8월부터 시작 예정."},{"id":"dec-slk-004","class":"Decision","label":"LG이노텍 MOU 잠정 보류(Holding)","desc":"LG이노텍 부문장(민존 CTO) 지시로 예정됐던 리얼월드와의 MOU가 잠정 보류됨. 부문장이 외부 검증 결과 대신 RFM 구조를 직접 분해해 리얼월드 모델이어야 하는 논리적 근거를 분석하라고 챌린지. 대응으로 LG이노텍 실무진은 타사 모델 비교 분석을 진행하고, NVIDIA 표준화 협력 세션은 MOU 성사와 무관하게 7월 2~3주차부터 정상 진행하기로 조율. 리얼월드는 신진우 교수 직접 미팅 및 NVIDIA Andy 지원사격 등 전문가 카드로 대응."},{"id":"dec-slk-005","class":"Decision","label":"LG이노텍 MOU 체결식(대면 서명+PR 보도) 진행 결정","desc":"LG이노텍과 MOU를 단순 체결이 아니라 상호 만나 서명·날인하는 체결식 이벤트와 미디어 보도를 함께 진행하기로 하고, 6월 8~9일 중 체결식을 진행하는 것이 가장 좋다고 합의. 이후 이노텍 홍보팀 요청으로 PR 보도는 8월 2주차로 조율 논의됨."},{"id":"dec-slk-006","class":"Decision","label":"LG CNS 제안 Phase 구분(1차 Tele Op 데이터수집+HW+라이센스, Human data는 Phase2)","desc":"LG CNS 견적을 1차에는 Tele Op 기준 데이터 수집 및 환경구축 HW 판매(로봇 및 수집장비) + RRC/RLDX-1 라이센스 비용을 포함해 제안하고, Human data 수집 방법론·장비는 내부 정리가 더 필요하므로 이번 제안에서 제외하고 Phase2로 명시하기로 함."},{"id":"dec-slk-007","class":"Decision","label":"농심엔지니어링 안양공장 방문 및 차기 미팅 6월 중 확정","desc":"농심측 프로젝트 방향·기간이 리얼월드와 잘 얼라인됨을 확인하고, RX팀과 함께 메인 생산 테스트베드인 안양공장을 방문해 핵심 태스크(비닐 개봉, 불량 선별 등) 현장 확인 및 니즈 청취를 진행하기로 협의. 현장 방문·세부 일정 조율 차기 미팅을 6월 중으로 진행하기로 확정."},{"id":"dec-slk-008","class":"Decision","label":"CJ대한통운 RX/Data 파트너십 1차 계약 범위 합의","desc":"CJ대한통운과 1차 계약 범위를 오네(택배) 사업부의 MP 인덕션 분류 작업에 집중(FT 사업부 피킹·포장은 제외)하기로 하고, 6개월 프로젝트로 간단한 공정 조건에서의 현장 PoC를 목표로 합의. RX 현장 진단과 데이터 파트너십(수집·학습·PoC 검증)을 단일 계약으로 포괄 추진하고, 실제 현장 조업 테스트 수준의 PoC를 지향. 6월 내 계약 마무리 추진."},{"id":"dec-slk-009","class":"Decision","label":"르네사스 협업/컨설팅 프로젝트 진행 결정","desc":"일본 반도체 대기업 르네사스와 ①공장내 Data+PoC, ②MCU+NPU 기반 협업 컨설팅을 진행하기로 함. 기존 리포트 구매(800~900만엔, 이번달 즉시 통과 가능)와 7월말까지 주 1회 정례미팅 형태로 착수하며, 향후 오이타공장 연계 통합 pricing 1억~1.5억 가능. 리더십(중희)도 삼성전자 NPU 투자 논의 맥락에서 NPU 회사들과 적극 추진하라고 지시."},{"id":"dec-slk-010","class":"Decision","label":"AWS APN 가입 및 ISVA 파트너 등급 취득 추진","desc":"AWS APN(Partner Network) 가입 및 상위 등급 ISVA 파트너 취득을 위해 AWS Marketplace에 리얼월드 Opportunity 15건을 등록하고 Qualified 여부 확인 절차를 진행. 각 Account별 AWS AM Consent 확보를 위해 고객사 카운터파트 정보를 정리하기로 함."},{"id":"dec-slk-011","class":"Decision","label":"APTO 파트너십: 공동 PoC 1건 우선 진행, MOU는 이후 검토","desc":"일본 데이터 수집 플레이어 APTO에 대해, 적합한 파트너인지 판단이 어려운 상황이라 우선 APTO가 제안하는 공동 PoC 1건을 진행하며 영업력·파인튜닝 능력을 가늠한 후 다음 단계를 결정하기로 함. APTO가 강하게 원하는 MOU 체결은 시리즈 A 도움 여부 확인 후 결정하되, 도움이 안 되면 공동 PoC 이후로 미루는 방향."},{"id":"dec-slk-012","class":"Decision","label":"LG이노텍(LGIT) 딜에 리서처 리소스 투입 지원 결정","desc":"미팅에서 중희가 LGIT 건은 리얼월드 리서처 리소스를 투입해서라도 성공률이 잘 나오도록 영업 비용 관점에서 지원하자는 방향을 제시. 신진우 교수·스톰과 미팅을 어레인지해 접근 방향을 논의하기로 하되, 전담 인력 배정·지원 방식은 신교수 피드백 후 별도 논의 예정."},{"id":"dec-slk-013","class":"Decision","label":"자동차 과제 용역 MOU 금액·역할 확정 (총 8천만원)","desc":"자동차 과제 용역 MOU를 총 8천만원(2·3·4차년도 각각 3천·3천·2천만원)으로 확정. 역할은 모델 제공 및 기술지원(질의응답), 수집 데이터 피드백, 재학습 모델 제공. MOU 초안 수령(차주 수)·전달(차주 금) 일정 확정."},{"id":"dec-slk-014","class":"Decision","label":"Compass 국책과제 예산 배분 확정 (인건비 6.4억 / 연구활동비·GPU 1.6억)","desc":"PM 확인 결과 전체 민간부담금 16억의 40% 현물이 인건비로 가능하여, 6.4억을 인건비로 잡고 나머지 1.6억은 연구활동비 및 GPU 임차 비용으로 편성하기로 확정."},{"id":"dec-slk-015","class":"Decision","label":"LG이노텍 MOU 체결 추진 (체결식 준비)","desc":"LG이노텍과의 MOU 체결식을 진행하기로 하여, 이사 예정 신규 오피스에서 체결식 장소 및 현수막 사이즈를 확정하기로 함."},{"id":"dec-slk-016","class":"Decision","label":"M.AX(제조 인공지능 전환) 얼라이언스 가입 신청 진행","desc":"제조 인공지능 전환(M.AX) 얼라이언스 가입신청서를 작성해 가입을 진행하기로 함."},{"id":"dec-slk-017","class":"Decision","label":"사업계획(PL Projection) 수립 담당자·일정 확정","desc":"미국·일본·한국 시장별 사업계획 담당자 선정(미국 Carl, 한국 Victoria), PoC는 Victoria·RX는 용재-Victoria 협의로 수립. PL 모델 1차 정렬 6/29, 최종 7/10, Finance 팀 초안 6/30·확정 7/10로 일정 확정."},{"id":"dec-slk-018","class":"Decision","label":"산업부 AI 응용제품 신속 상용화 과제, ARA와 진행 방향","desc":"산업부 AI 응용제품 신속 상용화(글러브·agent) 2차 공고 대응으로, 한자연에 품목요구서(암묵지 1장)와 AI agent 과제향 1장을 작성·제출하되 딥핑소스 역할을 줄여 ARA와 협업 가능하도록 정리. 세부 금액·요건은 스레드에서 후속 조정."},{"id":"dec-slk-019","class":"Decision","label":"25자유도 핸드 과제 드랍 (테솔로·위로보틱스 불참)","desc":"테솔로·위로보틱스가 불참하면서 25자유도 핸드 과제를 드랍하기로 정리(HK 싱크 안건)."},{"id":"dec-slk-020","class":"Decision","label":"경남 국책과제 스코프 정의 (LAM 비정형 작업)","desc":"경남 과제에서 리얼월드는 사출·선반 정보를 다루는 모델을 만드는 것이 아니라 LAM 영역의 비정형 작업 수행으로 스코프를 정의. 메가존 과제에서 전체 기계를 다루지 않음이 드러나도록 정리."},{"id":"dec-slk-021","class":"Decision","label":"BPS Weekly 정례 일정 변경 (매주 수요일 10:30)","desc":"BPS Weekly 정례 회의 일정을 이번 주부터 매주 수요일 오전 10:30으로 변경 확정."},{"id":"dec-slk-022","class":"Decision","label":"KCCS 파트너십, 비구속 MOU 기반 단계적 협력 프레임워크로 추진","desc":"KCCS/Kyocera가 요구한 구조화된 파트너십 정렬에 대응해, 비구속(Non-Binding) MOU v1.0 초안을 준비하고 KCCS를 물류 워크플로우에 VLA 로보틱스를 임베딩하는 시스템 인테그레이터(SI)로 포지셔닝하는 단계적 협력 프레임워크로 진행하기로 방향을 잡음. 초안은 RLWRLD에 유리/보호적으로 설계했고, 3/6 내부 논의 후 다음 주 초까지 첫 외부 draft를 공유하는 것을 목표로 함."},{"id":"dec-slk-023","class":"Decision","label":"KCCS MOU 데이터/IP 소유권 원칙 합의(raw=고객, 가공=RLWRLD)","desc":"제품팀(HK) 논의를 반영해 MOU의 데이터/IP 소유권 원칙을 정리: 원칙적으로 raw 데이터는 고객 소유, 가공(processed) 데이터는 사업적 필요에 따라 RLWRLD 소유로 하되, RLWRLD는 raw를 포함한 모든 수집 데이터에 대한 사용권/접근권을 반드시 보유. annotation·neural trajectory 등 기술 비중이 높은 일부 가공 데이터는 in-house로만 보유. 문서상 '2차 저작물'의 IP 언급과 유료 계약/서비스로서의 데이터 수집 표현은 회피(데이터 소유권 주장 약화 방지), 대신 '연구 협력 결과 공유'로 표현."},{"id":"dec-slk-024","class":"Decision","label":"Hitachi Systems RX/RD/PoC, 2026년 4월 신회계연도부터 1년간 추진","desc":"Hitachi Systems는 회계연도 종료(2026년 3월 말)까지 전담 인력 배정이 어려워, RX/RD/PoC 이니셔티브를 2026년 4월 신회계연도 시작 시점부터 1년간 검토·추진하기로 함. RX/PoC 장소는 Hitachi Systems에 국한하지 않고 Hitachi 그룹 내에서 적합 사이트를 탐색해 결정하기로 함."},{"id":"dec-slk-025","class":"Decision","label":"KCCS PoC 3종 계약·가격 확정 (JPY 20M)","desc":"KCCS(교세라 커뮤니케이션 시스템즈) 나가레야마 물류창고 3개월 온사이트 PoC의 3종 계약(기본거래+시스템개발+개별계약)이 지급조건 포함 전부 합의됨. 총액 JPY 2,000만, 50/50 분할(작업착수 확인 시 일부, 온사이트 납품·검사 시 잔액), PO 목표 6/30, 온사이트 킥오프 ~7/6."},{"id":"dec-slk-026","class":"Decision","label":"Ryoyo Ryosan 비구속 MOU 무수정 체결 결정","desc":"일본 tier-1 NVIDIA 유통사 Ryoyo Ryosan이 내부 법무·사업 검토 후 현재 비구속 MOU 초안을 레드라인 없이 그대로 서명하기로 함. RLDX·RRC를 Ryoyo 오퍼링에 추가하는 Co-GTM 및 공동 보도자료 추진에 합의."},{"id":"dec-slk-027","class":"Decision","label":"Macnica 파트너십 진행 방향·비즈니스 모델 합의","desc":"또 다른 tier-1 NVIDIA 유통사 Macnica와 NDA → 2단 MOU(장기 일본 Physical-AI 파트너십 + 3개월 공동 데모 구축) → 신요코하마 로봇검증센터 공동 데모 순으로 진행하기로 합의. 비즈니스 모델은 RLWRLD=SW 구독, Macnica=HW+배포 후 서비스로 정렬(Ryoyo와 동일)."},{"id":"dec-slk-028","class":"Decision","label":"APTO 비구속 MOU 프레임워크 합의","desc":"데이터 중심 AI 기업 APTO(RLWRLD K.K.)와 비구속 MOU 협의. RLDX-1 + RRC + APTO 데이터 수집/파인튜닝을 결합한 4단계 프레임워크로 협업하기로 함. 첫 유스케이스는 ~2026년 8월 착수, 상업 확장은 2027년 하반기 이후."},{"id":"dec-slk-029","class":"Decision","label":"농심 공장 로봇화 PoC 팔레타이징 최우선 과제 선정","desc":"농심 스마트팩토리팀과의 공장 로봇화 PoC에서 후보 작업 6가지 중 팔레타이징을 최우선 과제로 선정. 안양공장을 테스트베드로 지정하고 국내 계열공장·해외(아메리카) 공장까지 확대 검토."},{"id":"dec-slk-030","class":"Decision","label":"Toyota Systems 협업 구조 확정 (TS=인테그레이터, RLWRLD=기술/VLA)","desc":"Toyota Systems(TS)가 Toyota Motor(TMC) 대상 인테그레이터/창구 역할을 맡아 제안·배포·현장지원을 소유하고, RLWRLD는 기술/VLA 레이어에 집중하는 구조로 정렬. PoC를 첫 프로젝트로 진행. 타깃 과제 2개(양팔 VLA 고무코드 풀기, ~60cm 자동차 수지부품 빈피킹) 선정."},{"id":"dec-slk-031","class":"Decision","label":"Mitsui 협업 zero-base 재설정 결정","desc":"강욱(CEO)이 미쓰이가 공유한 Deck의 기존 PoC 예산안을 그대로 받지 말고, 미쓰이 협업을 zero base에서 재설정해 협업 범위·타깃 PoC·프라이싱을 새로 논의하기로 지시. Finetune 협업은 LG이노텍/LG CNS 진행건과 긴밀히 논의하며 진행."},{"id":"dec-slk-032","class":"Decision","label":"이마트·CJ대한통운 논의 가속화 우선순위 결정","desc":"강욱(CEO)이 이마트와 CJ대한통운 논의를 가속화하기로 결정하고, 관련 담당자들에게 금주 중 상황 논의 및 빠른 next step 진행을 지시."},{"id":"dec-slk-033","class":"Decision","label":"AWS를 KCCS 프로젝트에 투입하지 않고 케이스 스터디로만 활용 합의","desc":"AWS Japan과의 협의에서, 이미 상당히 진행된 KCCS 프로젝트에는 AWS를 투입하지 않고(디스럽션 리스크) 익명화된 케이스 스터디로만 활용하며 향후 다른 프로젝트에 AWS를 도입하기로 합의. 파트너 후보로 SCSK를 최우선(top pick)으로 두고 Okamoto팀이 AWS 내부 정렬 후 3자 딜 구조 스케치를 공유하기로 함."},{"id":"dec-slk-034","class":"Decision","label":"DSTA 제안서 패키지 방향 결정 (LG CNS 모델 준용)","desc":"DSTA(드론 생산 및 위험물 처리 유스케이스) 대상 제안서를 LG CNS 케이스와 마찬가지로 HW & Arm - RRC - finetuning 패키지를 메인으로 제안하기로 함. NDA 체결(DSTA측 버전 공유 예정) 후 작업영상 공유·태스크 타임라인 수립, 선호 핸드/암 조합 공유 및 제안서 작성."},{"id":"dec-slk-035","class":"Decision","label":"KDDI Data PoC 보류","desc":"KDDI 포트폴리오 중 Data PoC를 보류(on hold). KDDI 리소스가 국책과제에 묶여 있는 것이 사유. AIRoA RB-Y1 공급은 협상 중(9월 2대, 연말 ~50대), METI/NEDO GENIAC(10월'26~9월'27, ~JPY 50M, 채택 결정 9월 중순), MIC WattBit(~JPY 50M, 채택 7월 중순) 진행. BD 리드는 Hoon→Jihoon으로 전환."},{"id":"dec-slk-036","class":"Decision","label":"ICML Robotics Night 개최 (7/8 사옥 이전 기념 리서처 초대 행사)","desc":"ICML(서울 개최)을 계기로 7/8 사옥 이전 기념 리서처 초대 행사를 개최하기로 함. 데모 부스 대신 리서치 커뮤니티 침투·채용 활용을 목적으로 하고, rlwrld.co human-memorizable 단축링크 대시보드(/icml 등)와 라이브 데모로 운영. 6/15 In-N-Out 시점 ~23명 등록(ICML 저자 콜드메일 40명 중 ~10명 + 알음알음)."},{"id":"dec-slk-037","class":"Decision","label":"일본 시장 단계적 진입 전략 (RRC + RDX one)","desc":"일본 시장은 on-site 고성능보다 PoC 키트·플랫폼 try-out 수요가 중심이고, RLWRLD가 일본에서 physical AI on-site PoC를 제공하는 사실상 유일한 플레이어라는 판단 하에, RRC + RDX one으로 단계적으로 진입하는 방향을 설정."},{"id":"dec-slk-038","class":"Decision","label":"롯데호텔 PoC 프라이싱 합의 완료 및 계약 구조 확정","desc":"롯데호텔 PoC 프라이싱 합의가 완료되어 계약서 초안 검토에 진입했고, 6개월마다 갱신하는 구조로 논의 확정. 각 구간별 task 성공기준을 DX팀+집행부서 참관 하에 검수 후 대금이 지급되는 형태."},{"id":"dec-slk-039","class":"Decision","label":"첫 6개월 계약기간 50개 task 데이터 수집 계획 확정","desc":"첫 계약기간 6개월 동안 수행할 50개 task(객실 정비 중심) 데이터 수집 계획 수립을 완료하고 최종 확정. 데이터 수집이 안정화 단계에 진입했다고 판단."},{"id":"dec-slk-040","class":"Decision","label":"티스푼 배치 task를 Phase 1 스코프에서 제외","desc":"'티박스 티스푼 배치' task는 티스푼 두께가 얇아 Wuji 핀치가 잘 안 되고 억지 시도 시 고장을 유발하여 Phase 1 스코프에서 제외. 비즈니스 측(용재)도 'Phase 1 1개 task 조정 가능'으로 승인."},{"id":"dec-slk-041","class":"Decision","label":"3D Scan 기반 neural trajectory를 롯데 전달 결과물에서 제외","desc":"RD-RX 미팅 피드백 반영 결과, 3D Scan 기반 neural trajectory는 롯데에 전달할 결과물에서 제외하기로 결정. 3D Scan 결과물의 별도 활용 방안은 구체화 예정."},{"id":"dec-slk-042","class":"Decision","label":"롯데 전담 파일럿 추가 채용 확정","desc":"파일럿/GPU PC 부족으로 병렬 데이터 수집이 어려운 blocker 해소를 위해 롯데 전담 파일럿 추가 채용을 진행, 1명 채용 통보 완료(5/28 출근). 이후 전담 파일럿 2명 신규 입사 및 온보딩 완료."},{"id":"dec-slk-043","class":"Decision","label":"GR00T를 메인 모델로 진행","desc":"물컵 task 인퍼런스 비교(gr00t 1.5 70% vs RLDX 50%) 결과 gr00t를 메인 모델로 진행하기로 결정. 추가 데이터는 컵의 입 닿는 부분을 파지하지 않도록 수집 예정."},{"id":"dec-slk-044","class":"Decision","label":"Wuji 반복 고장으로 메인 핸드 HW를 Xhand로 교체","desc":"Wuji 하드웨어의 반복적인 고장(역구동성 부재로 파지 시 무리·양손 고장 빈발)으로 인해 롯데 데이터 수집 메인 핸드를 Xhand로 교체하기로 결정. Xhand는 Phase 1 텔레옵 수집에 문제없음을 사전 테스트로 확인, tactile 수집 upside도 존재."},{"id":"dec-slk-045","class":"Decision","label":"LG이노텍과 Non-binding broad MOU 체결 방침 확정","desc":"5/13 미팅 후 CTO 보고까지 완료하며, 이노텍(HW)과 RLWRLD(SW)의 상호보완 구조를 전제로 우선 Non-binding·broad 형태의 MOU를 먼저 체결하고 초기 MOU를 RLWRLD 런칭 행사에서 공고하기로 결정. 비즈니스 모델은 HW 개선 협업 + Co-GTM(양사 고객 풀 상호 활용)으로 합의."},{"id":"dec-slk-046","class":"Decision","label":"이노텍 제출 견적 약 12억 규모로 산출 및 인건비 표현 재정의","desc":"이노텍 제출용 견적을 약 12억원(11.95억) 규모로 확정: PoC 및 기술전수 약 8.9억, CES 협업 3.75억. 기존 'POC 직접 인건비'로 표현한 항목을 IP 영역임을 강조하기 위해 '전문기술서비스 및 지식자산 활용비'로 변경."},{"id":"dec-slk-047","class":"Decision","label":"PoC는 7DoF 불가, 자체 핸드로 진행 결정","desc":"6/17 내부 확정: LGIT 제공 7DoF 핸드는 자유도가 낮고 파지 속도(1.5초)가 느려 dexterous task·데이터 수집에 부적합하다고 판단, PoC는 7DoF로 불가하며 wuji/tesollo/Xhand 중 자체 핸드로 진행하기로 함(최종 스펙은 Product 15DoF 주장, Biz가 LGIT 개발속도에 맞춰 결정). 그러나 이후 6/29~6/30 MOU 협업 로드맵에서 이노텍 기 전달 7DoF 핸즈로 9월 1차 데모를 하고 13DoF 개선품으로 CES 최종 데모를 하기로 정리되며 '7DoF 절대 불가·자체 핸드' 방침은 번복됨."},{"id":"dec-slk-048","class":"Decision","label":"비전 모듈: 내부 얼라인 기능 탑재 요구 + inference용 저가 모듈 수용","desc":"비전 모듈은 내부적으로 얼라인된 기능이 탑재된 제품 개발을 이노텍에 요구하기로 결정. inference 용도로는 ZED 카메라 수준의 모듈을 훨씬 더 싸게 공급받을 수 있으면 OK로 방침 확정."},{"id":"dec-slk-049","class":"Decision","label":"CES POC 핸드 DOF는 LGIT 타임라인 기준 역산 논의, 비전 device는 장기 과제로 분리","desc":"6/17 미팅에서 (1)무조건 15DOF로 시작하기보다 LGIT 타깃 핸드 출시일정(9월말~10월)을 고려해 가능한 DOF(13DOF 포함) 기준으로 CES POC 데모씬을 역으로 논의하기로 함, (2)핸드 상세 스펙·URDF·택타일 정보와 scene 영상을 LGIT이 정리해 공유하기로 함, (3)비전 데이터 수집용 device 논의는 CES와 무관한 장기 협업 주제로 분리 진행하기로 결정."},{"id":"dec-slk-050","class":"Decision","label":"9월 1차 데모(7DoF+Tactile+Palm cam) → CES 최종 데모(13DoF) 단계 계획","desc":"MOU용 협업 로드맵으로 정리: 로봇핸즈는 이노텍에 기 전달된 7DoF 핸즈에 Tactile·Palm cam 모달리티를 포함해 9월 1차 데모를 수행하고, 이후 13DoF 핸즈(개선품)를 기준으로 최종 CES 데모 시연을 하기로 방향 설정. CES 일정은 최종 Target으로 변경 불가."},{"id":"dec-slk-051","class":"Decision","label":"이노텍 MOU 체결식 PR 보도문구 1안 채택","desc":"MOU 체결 PR 보도용 문구로 '글로벌 Physical AI 생태계 공동 구축을 위한 전략적 협력 양해각서(MOU) 체결식'(1안)을 채택. KW·Hensen·중희(Junghee) 모두 1안이 더 명확하고 전달력 있다며 동의해 1안으로 의견 수렴 완료."},{"id":"dec-slk-052","class":"Decision","label":"PoC를 RLWRLD 랩 환경에서 진행 합의","desc":"FUJI 아오키상과의 콜에서 PoC를 RLWRLD 랩 환경에서 진행하기로 합의. FUJI는 실제 피더/랙 사용을 강하게 선호하며, 페이로드 제약상 가벼운 피더부터 시작하는 것에 열려있음."},{"id":"dec-slk-053","class":"Decision","label":"PoC 기술 접근으로 Modular VLA 채택 검토","desc":"E2E VLA는 occlusion 이슈로 어려워 Modular VLA(홀 영역 bounding box 세그멘테이션 + 삽입 중 오브젝트 포즈 추정/트래킹 + 사전 수집 teleop 데이터 리플레이) 방향으로 검토. Object는 실제 FUJI 카세트 피더(3cm, ~3kg) 상정."},{"id":"dec-slk-054","class":"Decision","label":"PoC 피더를 Intelligence Feeder로, RLWRLD 제안 modified 환경 진행 합의","desc":"2/27 FUJI 방문 결과, PoC 대상 피더를 기존 Cassette가 아닌 볼륨존 Intelligence Feeder로 하기를 FUJI가 희망하고, PoC 성과물을 RLWRLD 제안 modified 환경에서 진행하는 것에 합의. RX 대상 공정은 FUJI가 볼륨존 기준으로 선정 예정."},{"id":"dec-slk-055","class":"Decision","label":"FUJI 계약서 '데이터' 조항 삭제/조정 추진","desc":"FUJI 계약서의 데이터 관련 조항은 삭제 혹은 조정이 필요하다고 판단, FUJI에 솔직히 전달하기로 함."},{"id":"dec-slk-056","class":"Decision","label":"FUJI PoC 상세 시나리오 확정(실제 Intelligence Feeder, 5/4/3cm)","desc":"실제 Intelligence Feeder(폭 8mm, 3kg) 대상, 천 소재 선반(높이 45cm)+divider, 폭 variation 5/4/3cm, Baseline은 5cm 넣기/빼기 성공률로 하는 상세 PoC 시나리오 확정 전달. RFM 확장성(학습 반복 시 성공률 유지·필요 학습량 감소)과 환경 tolerance 검증."},{"id":"dec-slk-057","class":"Decision","label":"PoC Object=아크릴 목업(손잡이 확대)·E2D 확정, 스토리 재설계","desc":"FUJI 6월 월례에서 PoC Object를 실제 Feeder가 아닌 손잡이를 키운 아크릴 목업으로, E2D(빼낸 뒤 넣기) 방식으로 진행 확정. PoC 스토리를 3cm에서 학습→4/5cm 수행 + 3cm 통제환경을 Base로 환경/오브젝트 변화 시 추가 학습량을 보여주는 방향으로 재설계."},{"id":"dec-slk-058","class":"Decision","label":"제시할 변화 시나리오 3종 내부 확정, 리얼 피더 8월 미사용","desc":"FUJI에 제시할 확장성 변화 시나리오 3종 확정 — (1)그림자/자연광 방향, (2)옆 사람/방해물(배경 세그멘테이션·depth 마스킹으로 커버), (3)피더 종류 변경(손잡이는 표준화, 하부 형태·두께만 상이). 리얼 피더는 8월엔 미사용(비즈적 도움 시 플러스알파로만 시도 여지). 목업은 손잡이 확대·각진 부분 제거 후 재프린트."},{"id":"dec-slk-059","class":"Decision","label":"시나리오 동작을 '피더 뺀 뒤 몸 돌려 삽입'으로 변경, Baseline 3cm 계획","desc":"공간 확보를 위해 시나리오를 피더를 뺀 뒤 몸을 돌려 집어넣는 동작으로 변경(몸통 회전 관련 RD 내부 논의 필요). 3cm baseline은 약 150 에피소드가 필요하며 7/29 FUJI 방문까지 습득 가능하다고 판단. 시나리오2는 좌우 2개 피더 중 1개만 픽업하는 형태로 정리."},{"id":"dec-slk-060","class":"Decision","label":"CJ대한통운 O-NE 협업 다음 단계 진행 (go)","desc":"CJ대한통운 구성용 상무가 O-NE 솔루션 담당 김민수 상무와 논의 후 RLWRLD와 다음 단계로 진행하자는 의견을 전달. 이에 따라 실무진 QnA 세션 및 후속 제안 준비로 진행하기로 함."},{"id":"dec-slk-061","class":"Decision","label":"6개월 PoC 범위를 '제한 조건 기반 핵심 동작 검증'으로 재정의","desc":"CJ대한통운 피드백을 반영해 6개월 내 PoC 목표를 '현장 생산성 검증'이 아니라 '제한 조건(제한 SKU·속도·payload) 기반 핵심 동작 검증'으로 재정의하고, 가능/조건부 가능/현재 불가 범위를 구분해 계약 전 목표를 수립하기로 함."},{"id":"dec-slk-062","class":"Decision","label":"CJ대한통운 PoC/현장방문 담당 Lead 배정 (제안)","desc":"Next step별 Lead를 제안: PoC 스펙 정교화 Lead는 RD PM(준수), 현장 방문 Lead 및 인덕션 한정 로드맵 구체화 Lead는 RX PM(Iris), 참여는 Product(Storm)·RD·BSP. 제안 수준으로 잠정 확정."},{"id":"dec-slk-063","class":"Decision","label":"CJ대한통운 현장 방문 참여 팀/인원 구성 (잠정)","desc":"CJ 방문 일정에 참여할 팀 구성을 정리: BSP팀 Victoria(수환 optional), RX팀 Iris+알파, RD팀 준수+알파, Product팀 Storm+알파. 각 팀 참여 인원 확정 요청과 함께 잠정 합의."},{"id":"dec-slk-064","class":"Decision","label":"데모 시나리오를 '곤지암 허브 인덕션'으로 잠정 협의","desc":"현장 방문 시 확인한 결과, 데모 시나리오를 '곤지암 허브 소형소터 인덕션' 시나리오로 하는 것으로 잠정 협의. 세부 조건(컨베이어 속도, Object 형태/사이즈/무게, 지속시간, 데모 장소)은 후속 정리 대상."},{"id":"dec-slk-065","class":"Decision","label":"PoC 대상/속도/무게 제약조건 가이드 (잠정)","desc":"PoC 제약조건 가안: 대상 Object는 박스로 10 SKU 내에서 사이즈 협의 결정, 무게는 500g 이하, 수행속도는 평균 1 SKU/5초, 데모장소는 모사환경 선호(현장 데모는 CJL 내부 의견 청취 후 협의). 우선 가이드 수준의 잠정안으로, 지속 논의하며 변경 가능."},{"id":"dec-slk-066","class":"Decision","label":"KDDI 에고센트릭 Trial PoC 촬영 가이드 초안 확정 및 KDDI 전달 결정","desc":"KDDI Ego-centric Trial PoC를 위한 촬영 가이드(작업자용 촬영 주의사항/셋업) 초안을 사내 검토 완료 후 확정하고, 일본어 번역을 거쳐 KDDI에 전달하기로 결정. 이후 본격 데이터 수집 전 가이드 하단 4가지 패턴에 대한 샘플 영상을 촬영하고 사내 협의로 최종 데이터 수집 셋업을 정하는 순서로 진행하기로 함."},{"id":"dec-slk-067","class":"Decision","label":"NVIDIA 협업 3대 트랙 및 진행 우선순위 확정","desc":"RLWRLD×NVIDIA 협업을 1) Industry-Standard Dexterity Benchmark 공동개발, 2) Robotics Dexterity Data Pipeline 표준화, 3) Joint Research 세 트랙으로 구성하고 Benchmark→Standardization→Joint Research 순으로 우선순위를 두어 진행하기로 확정. Benchmark는 즉시 착수. 방향성은 이미 NVIDIA 내부 임원 보고·엔도스먼트까지 완료되어 합의된 상태로 명시."},{"id":"dec-slk-068","class":"Decision","label":"협업 트랙별 Technical Champion(기술 담당) 지정","desc":"NVIDIA 협업 3개 아젠다별 Technical Champion 겸 Communication Gateway를 지정: 1) Benchmark 공동개발=Junho Cho(Jacey), 2) Data Pipeline 표준화=Seungcheol Park(승철), 3) Joint Research=Seungjun Moon(승준). 각자 기술 요소 검토·미팅 참여·팀내 협업 담당."},{"id":"dec-slk-069","class":"Decision","label":"DexBench Ver1 우선순위 4개 Task 영역 결정","desc":"18개 태스크를 한 번에 구현할 리소스가 없어, 지난주 미팅에서 DexBench Ver1의 우선순위 4개 Task 영역을 확정: T0 Special Picking, T03 Precision Insertion/Placing, T16 Tool-Use, T17 Moving Object Interaction. 산업 관련성·dexterity 커버리지·시뮬 구현 적합성 기준으로 선정, 우선 런칭 후 확장."},{"id":"dec-slk-070","class":"Decision","label":"DexBench 상세 시나리오 v5(Revised) 1차 확정","desc":"논의 사항을 반영한 DexBench_Revised 상세 시나리오 리스트(v5)를 1차 확정 버전으로 정하고, 해당 버전으로 Eval protocol 설계 후 익일 NVIDIA와 얼라인·구현 착수하기로 함. Special picking(T0), Precision placing/insertion(T03), Tool-use fastening(T16), Moving object interaction(T17) 세부 태스크 교체 반영."},{"id":"dec-slk-071","class":"Decision","label":"DexBench 4개 공유환경 구조로 재설계 확정 (NVIDIA 피드백 수용)","desc":"NVIDIA 피드백(환경별 개별 씬 대신 소수 공유환경에서 다수 태스크를 돌려 Arena composability를 부각)을 수용해, 13개 독립 시나리오를 4개 공유환경(Retail/Logistics/Manufacturing/Hotel)×13 태스크로 재아키텍처하기로 확정. 각 에피소드=Scene×Embodiment×Task×Object, 항공 등 과도하게 특정한 씬은 제거."},{"id":"dec-slk-072","class":"Decision","label":"DexBench 태스크/환경 세트 최종 확정 (4개 환경 × 14 태스크)","desc":"내부 정제와 NVIDIA KR팀 인풋을 거쳐 상세 태스크/환경 세트를 최종 확정: 4개 산업 환경(Retail/Logistics/Manufacturing·Hotel)×14 태스크. Design doc과 환경별 top-down 레이아웃·목업 렌더링까지 완성해 공유 가능한 수준으로 마감, NVIDIA 협업팀에도 공유."},{"id":"dec-slk-073","class":"Decision","label":"DexBench 이니셔티브 담당 실무 멤버 지정","desc":"Storm(배재경)이 DexBench 이니셔티브의 지정 담당 멤버로 Sejune Joo(세준), Seungjun Moon(승준), Donguk Lee(Duke), Changsung Jang(창성)을 배정. 이들이 Isaac Lab-Arena 상 환경/자산/태스크 구현 및 데이터 수집·sim2real 검증을 담당."},{"id":"dec-slk-074","class":"Decision","label":"Inception 파트너(N.DOT.LIGHT·Space AI) 협업 및 무비용·오픈소스 MOU 방식 확정","desc":"NVIDIA Inception 파트너 N.DOT.LIGHT(시뮬 자산)·Space AI(물리엔진)와 1차 콜 후 양사 모두와 협업 진행 확정. 협업 3사(+Physics Sim Lab) 모두 MOU 체결 후 별도 비용 없는 파트너십 형태로 진행하고, 결과물 IP는 Isaac Lab-Arena 기반 오픈소스인 만큼 IP 전부 오픈소스·무비용임을 MOU에 명시하기로 함. KW가 go-sign 승인."},{"id":"dec-slk-075","class":"Decision","label":"HEMotors 핸드 구동 모터 3종 구매 테스트 확정","desc":"Donghyun Kim 교수가 제안한 HEMotors 덱스터러스 핸드 모터 3종(HEM-16MS9-24-02CR, HEM-16MS15-24-01PG, HEM-16MS9-24-12PS)을 Jaewook Lee가 '확인해보고 바로 구매해보겠다'며 구매·테스트하기로 확정."},{"id":"dec-slk-076","class":"Decision","label":"국책과제 지원 업무분담 및 채널 운영방식 확정","desc":"국책과제 준비 지원을 위해 Finance 관련은 Olivia(전지연), 그 외 Ops 관련은 Jihye(지혜)가 팔로우업하기로 역할을 확정. 국책과제 apply/진행 정보는 민감사항이라 공개 help 채널이 아닌 이 별도 채널에서 관리하기로 함. FS 자료는 필요 시 Olivia에게 요청+용도 설명, 비용자료 중 인건비만 지혜가 직접 입력하고 그 외 비용은 Olivia/Claire가 대응."},{"id":"dec-slk-077","class":"Decision","label":"국책과제 finance 자료 요청 표준 포맷·리드타임 확정","desc":"finance에서 재무/투자자 자료가 나갈 때는 (1)제출 과제명 (2)제출 서류 (3)필요 기한(최소 1주일 전) (4)필요 정보를 엑셀 표로 정리, 형식으로 요청하기로 확정. hwp는 권한상 열람만 가능하므로 엑셀로 달라고 <!channel> 공지."},{"id":"dec-slk-078","class":"Decision","label":"보안 자율점검표 대응 보류(과제 선정 시 진행)","desc":"인공지능 개인정보보호 자율점검표 관련 급한 액션플랜은 없는 것으로 결론. HR에서 보안책임자만 지정·공유하고, 자율점검표에 대한 현재 입장은 시트에 정리해두며, 향후 과제가 선정되어 추가 증빙이 필요해지면 그때 진행하기로 함."},{"id":"dec-slk-079","class":"Decision","label":"국책과제 제출자료 SharePoint 통합관리 체계 도입","desc":"국책과제 제출 과정에서 받은 finance/HR 자료를 SharePoint 폴더 하나에 모아 관리하기로 결정. 구글시트로 문서 목록과 공유 유의사항을 로깅하고, 공유 권한은 최소화하며, 민감자료는 외부 제출이 필요할 때 컨펌을 받고 사용하기로 함."},{"id":"dec-slk-080","class":"Decision","label":"LG이노텍 계약 대금 어음지급 및 주거래은행 어음약정 체결","desc":"LG이노텍(이노텍) 계약(계약금액 약 10억원) 관련, 이노텍 내부정책상 1천만원 이상 계약은 어음 지급 방식으로 진행됨을 확인. 이에 따라 리얼월드는 주거래은행과 어음/전자어음 약정을 체결한 뒤 어음약정 체결서를 이노텍 측에 제출하기로 확정."},{"id":"dec-slk-081","class":"Decision","label":"모빌린트 온디바이스 AI 반도체 국책과제 3건 수요기업 확약서 제공","desc":"NPU 업체 모빌린트의 산통부(한국산업기술기획평가원) 과제 3건(1.휴머노이드용 온디바이스 AI반도체, 2.차세대 협동로봇용 온디바이스 AI반도체 및 SDK, 3.AI홈용 온디바이스 AI반도체 기술개발)에 대해 리얼월드가 수요기업 확약서에 날인·제공하기로 함."},{"id":"dec-slk-082","class":"Decision","label":"MAX 얼라이언스(산업부) 가입","desc":"산업부 관련 MAX 얼라이언스 가입신청서에 날인, 가입을 진행하기로 함."},{"id":"dec-slk-083","class":"Decision","label":"중기부 GMEP 불참 결정","desc":"중기부 GMEP 건에 대해 불참사유서에 날인, 불참하기로 함."},{"id":"dec-slk-084","class":"Decision","label":"Compass 국책과제 협약 및 자부담금 자금구조(잠정)","desc":"Compass 국책과제 협약 진행 시 자금구조: 정부출연금 4억원, 자부담금 4억원(그 중 60%가 현금). 자부담금 중 현금 2.4억원은 사업 종료 3개월 전(2027-01-31)까지 지급, 정부출연금은 1차년도 2.5억원 협약 후 입금·2차년도 1.4억원 후지급 구조로 공유됨."},{"id":"dec-slk-085","class":"Decision","label":"6/19 정부 행사 라이브 데모 범위·일정 확정","desc":"6/19 중구 소공동 더플라자호텔에서 위로보틱스 ALLEX 3호기와 레인보우로보틱스 RB-Y1이 협동하는 pinky 라이브 데모(마우스박스 포장·정리 자동화)를 10:15~10:25 10분간 비공개로 진행하기로 확정. 준비는 당일 00:00~09:55, 로봇 철수는 폐회 이후로 정함."},{"id":"dec-slk-086","class":"Decision","label":"RB-Y1 운반용 포장박스 메카넘휠 타입으로 확정","desc":"행사 운반을 위한 RB-Y1 포장박스를 메카넘휠 타입으로 받기로 결정."},{"id":"dec-slk-087","class":"Decision","label":"엠바고 해제로 프로젝트 채널 공개 전환","desc":"엠바고가 풀려 비공개로 운영하던 데모 프로젝트 채널을 워크스페이스 내 공개 채널로 전환하기로 결정."},{"id":"dec-slk-088","class":"Decision","label":"제조암묵지 AI 과제 컨소시엄 구성·역할 확정 방향","desc":"암묵지 AI 모델개발 과제의 컨소시엄을 리얼월드(주관), 성우하이텍(수요기업), 한자연(참여), 임종우 교수님 연구실(용역) 형태로 구성하기로 정리. '진행될 것으로 보입니다'로 아직 완전 확정 전."},{"id":"dec-slk-089","class":"Decision","label":"기관별 예산 배분 잠정안 (리얼월드 8억·성우 6억·한자연 2억)","desc":"과제 예산을 리얼월드 8억, 성우하이텍 6억, 한자연 2억 수준으로 잠정 논의. 리얼월드 8억은 멀티카메라 2천, 텔레옵 2천, 인건비 2억, GPU/HW 커스텀 미정 등으로 구성. '아직 확정은 아님'을 명시."},{"id":"dec-slk-090","class":"Decision","label":"데이터 수집·모델 개발 R&R 분장","desc":"하드웨어(센서 부착·텍타일 글러브 개조 등) 및 데이터 수집은 리얼월드가, 3D 스캐너/데이터 수집 자문은 임종우 교수님 측이 지원. 외주용역은 핵심기술로 인정 안 되므로 계획서상 모델 개발은 리얼월드가 내부 수행하고 교수님 연구실은 기술지원·자문 형태로 작성하는 방향."},{"id":"dec-slk-091","class":"Decision","label":"연구책임자·발표자를 Sangwoo Kim(Lennon)으로 지정","desc":"주관기관 책임자가 대면 발표를 진행해야 하는 규정에 따라, 과제 연구책임자 겸 발표자를 Sangwoo Kim(Lennon)이 맡기로 함. 5/27 동대구 대면발표를 Lennon이 수행."},{"id":"dec-slk-092","class":"Decision","label":"모델 아키텍처: 3D 스캔 파이프라인과 멀티모달 모델 분리","desc":"End-to-end 단일 모델이 아니라 3D 스캔 파이프라인과 멀티모달 모델을 분리해서 구성하는 방향으로 정리. 3D 스캐너는 별도 트랙, 텍타일/FT/핸드메시 등 멀티모달 입력은 별개 모델로."},{"id":"dec-slk-093","class":"Decision","label":"H100 GPU는 구매가 아닌 임차로 진행","desc":"평가 질의에서 H100 임차료 2억이 과도하다는 지적에 대해, 사내 클라우드 클러스터 통합 비용을 고려하면 임차가 효율적이라 판단해 임차 방식 유지. 단 2억 금액 적정성은 협약 단계에서 재검토하기로 함."},{"id":"dec-slk-094","class":"Decision","label":"휴머노이드/엑스핸드는 계획 포함하되 정량 지표에서 제외","desc":"6종 모달리티 센서는 성우하이텍 생산라인에 투입하고, 휴머노이드에 VLA 모델을 탑재해 명장 공정 대체 가능성을 확인하는 시도는 포함하되 정량 지표에는 미포함하기로 함. 타당성은 협약 단계에서 추가 소명 예정."},{"id":"dec-slk-095","class":"Decision","label":"제품화 로드맵 가칭을 'RLWRLD Robotics Platform'으로 변경","desc":"내부 제품명 RRC와 미팅에서 쓰는 RRC가 혼동을 유발하여, 로드맵/제안 문서상 가칭을 'RLWRLD Robotics Platform 제품화 로드맵'으로 변경하기로 하고 Notion 페이지 명칭을 즉시 수정 반영함."},{"id":"dec-slk-096","class":"Decision","label":"수집~평가(4-1~4-6) 중심의 working prototype 우선 구축","desc":"현재 진행 가능한 재료를 모아 working prototype으로 합치고, 데이터 수집·증강·정제·학습·평가(4-1~4-6) 모듈을 우선 구현하는 방향으로 합의. real product에 무엇을 어떻게 넣을지는 Gerald·Richard가 상의하기로 함."},{"id":"dec-slk-097","class":"Decision","label":"상용화 단계 모듈(Workflow Orchestration·Fleet Management·OTA)은 추후로 보류","desc":"4-7~4-9(Workflow Orchestration, Fleet Management, OTA & Updates)는 실제 로봇 Deployment·상용화 단계 모듈로, 현 프로토타입 범위에서 제외하고 추후 고민하기로 함. 다만 고객 요구/기시장 Product 관점의 자료 수집과 하이레벨 요구사항은 Victoria가 미리 정리."},{"id":"dec-slk-098","class":"Decision","label":"판매정책·Pricing 논의는 Biz 워크샵에서 일규가 전사 관점으로 주도","desc":"판매정책·Pricing 등 모델+플랫폼 팀을 포함한 논의는 Biz 워크샵에서 Ilgyu(일규)가 준비한 내용(경쟁사 비교 포함)과 함께 전사 관점에서 전개하기로 함."},{"id":"dec-slk-099","class":"Decision","label":"한/미/일 3개 버전 목업 및 상품제안서 제작","desc":"상품설계 목업을 기반으로 한국·미국·일본 버전 페이지 목업을 완료하고 각 시장용 상품제안서를 정리하기로 넥스트스텝 합의. 목업 수정 반영(숫자 등 마이너 사항)은 차주까지, 버전별 목업 완료·제안서 정리는 추가 논의 필요."},{"id":"dec-slk-100","class":"Decision","label":"LOOP Productize 로드맵 방향 설정 (수집/증강/정제/학습/평가 5단계)","desc":"Richard가 LOOP(EaaS 프로토타입) Productize 로드맵을 5단계로 진행하기로 방향을 정함: (4-1) 수집은 현상태 유지, (4-2) 데이터 증강 UI 요소 마련, (4-3) 정제 단계에 에피소드 직접 선택 및 반영 비중 지정 기능 추가하되 DAgger는 일단 제외, (4-4) 여러 모델 동시 학습 흐름 추가, (4-5) 대략적 평가 및 실제 로봇 task 단위 리더보드 형태 평가. HK에게 cc하여 의견 요청했고 큰 방향은 합의되었으나 세부는 조정 중."},{"id":"dec-slk-101","class":"Decision","label":"학습 UX 순서 확정: 데이터 → 모델 → 파라미터셋(스윕), 모델 선택 후 스윕","desc":"다수 모델 학습 시 모델마다 파라미터 복잡도가 커지므로, 모델 선택 후 하이퍼파라미터 스윕을 할 수 있는 쪽으로 포커스를 맞추기로 함. 전체 순서는 데이터 → 모델 → 파라미터 셋(스윕). HK가 제안하고 Richard가 '네, 알겠습니다'로 동의하여 확정."},{"id":"dec-slk-102","class":"Decision","label":"학습 하이퍼파라미터 흐름 개편 + GPU 클러스터 선택 단계(AWS/Kakao/Naver) 추가","desc":"HK의 '하이퍼파라미터 추천은 sweep 여부와 sweep 조합까지 시스템이 상황에 맞게 제안해야 한다'는 피드백을 반영해 학습 흐름을 변경하기로 함. 기존 SWEEP/단순 학습 실행 선택 흐름을 제거하고 시스템이 제안하는 하이퍼파라미터를 기본으로 학습을 진행하며, 추천 조합·옵션을 테이블로 제공(batch size, max steps, learning rate, 추천 사유, 예상 비용 표시). 학습 전 GPU 클러스터를 AWS/Kakao/Naver 중 선택하는 단계도 추가. mockup UI에 반영 완료."},{"id":"dec-rl-project-group-goals","class":"Decision","label":"RL 프로젝트 그룹 목표 설정","desc":"리얼 로봇 가동 24시간 이내 base policy 성공률 95%↑ 달성 RL 파이프라인 내재화를 그룹 목표로 확정"},{"id":"dec-1step-denoising-rl","class":"Decision","label":"1-step denoising RL 진행 여부","desc":"DSRL-NA 외 대안으로 1-step denoising RL도 함께 시도하기로 결정 (우선 1-step SFT 성능 확인 후 진행)"},{"id":"dec-rl-research-direction-worldmodel-vla","class":"Decision","label":"향후 RL 연구 방향 align — World Model-VLA","desc":"월드모델-VLA를 '병목 없는 VLA cycle 완성'의 키로 보고, 이를 위해 dense data annotation 방향을 탐색키로 align"},{"id":"dec-rtc-experiment-design","class":"Decision","label":"RTC 실험 설계 확정 (RLDX 테크리포트용)","desc":"RLDX 테크리포트용 RTC 실험을 Conveyor_Mouse 타겟으로 설계 확정 — baseline(sync) vs RTC+kernel opt 성공률·inference 속도 비교"},{"id":"dec-dexbench-tasklist-13","class":"Decision","label":"DexBench 작업 목록 13개 정리 + 시나리오 영상 + POC 정렬","desc":"DexBench 초기 15개 태스크를 13개로 정리·정량화(물체사양·초기조건·성공기준), 개별영상 대신 하나의 시나리오/티저 영상으로 G0·S0 대표, 태스크 그룹 기반 비즈 POC + RX/RD 로드맵 정렬"},{"id":"dec-msra-collab-approach","class":"Decision","label":"MSRA 협업 방식 — 시뮬 병행 후 분담","desc":"MSRA와 시뮬레이션에서 동일 태스크를 각자 먼저 진행하고 2~3주 간격으로 progress 공유, 잘 되면 다음 단계 협업으로. 구체 task 선정은 추후 확정 예정"},{"id":"dec-rrc-release-1-0-0","class":"Decision","label":"RRC first release version = 1.0.0","desc":"RRC(Robotics Runtime/Control) 첫 릴리스 버전을 1.0.0으로 확정"},{"id":"dec-dataset-id-prefix","class":"Decision","label":"Dataset ID prefix 개념 도입","desc":"dataset ID 관리를 쉽게 하기 위해 prefix 개념 도입 결정 (+ RRC 1.0.0 버전 재확인)"},{"id":"dec-wujihand-sw-force-estimation","class":"Decision","label":"Wujihand LSTM 기반 SW force estimation + admittance control 도입","desc":"non-backdrivable worm gear라 motor current만으로 fingertip force 추정이 어려운 Wujihand에, LSTM 기반 software force estimation 도입 + force estimation/command generation 모듈 분리"},{"id":"dec-tactile-data-schema","class":"Decision","label":"택타일 데이터 저장 스키마 확정","desc":"택타일(촉각) 센서 데이터 저장 스키마를 센서별 taxel 구조 기반으로 확정 (XHand1 120 taxel/3D force+온도, PaXini 52 taxel, Inspire 8센서)"},{"id":"dec-cloud-inference-priority","class":"Decision","label":"Cloud inference를 높은 우선순위 과제로 확정","desc":"외부 협업 포함 프로젝트 특성상 cloud inference 도입 중요도가 높아, 높은 우선순위 과제로 확정"},{"id":"dec-haptic-observer-level","class":"Decision","label":"Haptic device — observer level 처리, HW layer는 보류","desc":"Haptic(Manus/RRC)을 ROS handler 없이 observer level에서 처리(최소 수정 지향). Hardware 의존 layer 추가는 현 시점 보류하고 추가 케이스 발생 시 설계"},{"id":"person-alex-ock","class":"Person","label":"Jonghoon Ock","desc":"Robotics Deployment"},{"id":"person-donghun-lee","class":"Person","label":"Donghun Lee","desc":"Robotics Deployment"},{"id":"person-donghyun-kim","class":"Person","label":"Donghyun Kim","desc":"Robotics Deployment Project Manager"},{"id":"person-donguk-lee","class":"Person","label":"Donguk Lee","desc":"Research Engineer"},{"id":"person-hayeon-kim","class":"Person","label":"Hayeon Kim","desc":"Business Developer"},{"id":"person-heecheol-kim","class":"Person","label":"Heecheol Kim","desc":"Robotics Deployment Project Manager"},{"id":"person-hoon-lee","class":"Person","label":"Hoon Lee","desc":"Business Developer"},{"id":"person-hyunkyu-hwang","class":"Person","label":"Hyunkyu Hwang","desc":"Business Project Manager"},{"id":"person-ilgyu-shin","class":"Person","label":"Ilgyu Shin","desc":"Business Developer"},{"id":"person-iris-cho","class":"Person","label":"Hyemin Cho","desc":"Business Developer"},{"id":"person-jacey-cho","class":"Person","label":"Junho Cho","desc":"Technical Strategist"},{"id":"person-jaehyun-kang","class":"Person","label":"Jaehyun Kang","desc":"Research Engineer"},{"id":"person-jaewook-lee","class":"Person","label":"Jaewook Lee","desc":"Hardware Engineer"},{"id":"person-jehoon-kim","class":"Person","label"     const N=G.nodes.filter(nodeActive);   // 숨긴 클래스 노드는 물리 계산에서 제외
    const many=N.length>60;
    // 여유 있는 배치 + 허브 분리: 반발력을 degree('전하')에 비례시켜 연결 많은 노드끼리 더 멀어지게, 중력은 약하게
    const REP=many?900:1600, GRAV=many?0.006:0.004, SPRINGL=many?150:150;
    // repulsion (charge-weighted)
    for(let i=0;i<N.length;i++){
      const a=N[i], ca=1+a.deg*0.16;
      for(let j=i+1;j<N.length;j++){
        const b=N[j];
        let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy;
        if(d2<1)d2=1;
        const d=Math.sqrt(d2);
        const f=REP*ca*(1+b.deg*0.16)/d2;
        const fx=dx/d*f, fy=dy/d*f;
        a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
      }
    }
    // springs (허브에 매달린 링크는 조금 더 길게)
    G.links.forEach(l=>{
      if(!linkActive(l)) return;
      const hub=Math.max(l.s.deg,l.t.deg);
      const L=(l.isa||l.instanceOf)?90:(SPRINGL+Math.min(hub,20)*4);
      let dx=l.t.x-l.s.x, dy=l.t.y-l.s.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=(d-L)*0.035;
      const fx=dx/d*f, fy=dy/d*f;
      l.s.vx+=fx; l.s.vy+=fy; l.t.vx-=fx; l.t.vy-=fy;
    });
    // gravity + integrate
    N.forEach(n=>{
      n.vx+=(cx-n.x)*GRAV; n.vy+=(cy-n.y)*GRAV;
      if(n.fx!=null){ n.x=n.fx; n.y=n.fy; n.vx=0; n.vy=0; return; }
      n.vx*=0.86; n.vy*=0.86;
      const sp=Math.hypot(n.vx,n.vy), max=18;
      if(sp>max){ n.vx=n.vx/sp*max; n.vy=n.vy/sp*max; }
      n.x+=n.vx*alpha*1.6; n.y+=n.vy*alpha*1.6;
    });
    alpha*=0.985;
  }

  function toScreen(n){ return [n.x*tf.s+tf.x, n.y*tf.s+tf.y]; }
  function neighborsOf(n){
    const set=new Set([n]);
    G.links.forEach(l=>{ if(l.s===n)set.add(l.t); if(l.t===n)set.add(l.s); });
    return set;
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    const focus = selN||hoverN;
    const nbr = focus?neighborsOf(focus):null;
    const isDim = n => (hiddenDom.has(n.domain)) || (focus && !nbr.has(n));

    // edges
    G.links.forEach(l=>{
      if(!linkActive(l)) return;
      const dashed = l.isa || l.instanceOf;
      const active = focus && (l.s===focus||l.t===focus);
      const dim = focus && !active;
      const [sx,sy]=toScreen(l.s), [tx,ty]=toScreen(l.t);
      ctx.beginPath();
      ctx.moveTo(sx,sy); ctx.lineTo(tx,ty);
      ctx.strokeStyle = active?domColor(l.s.domain):(dashed?cssv("--edge-isa"):cssv("--edge"));
      ctx.globalAlpha = dim?0.12:(active?0.9:(l.instanceOf?0.35:0.5));
      ctx.lineWidth = active?2:1;
      if(dashed){ ctx.setLineDash([4,4]); } else { ctx.setLineDash([]); }
      ctx.stroke();
      ctx.setLineDash([]);
      // arrowhead + rel label on active
      if(active && !dashed){
        const ang=Math.atan2(ty-sy,tx-sx), r=radius(l.t)*tf.s+3;
        const ax=tx-Math.cos(ang)*r, ay=ty-Math.sin(ang)*r, hd=7;
        ctx.globalAlpha=0.95; ctx.fillStyle=domColor(l.s.domain);
        ctx.beginPath();
        ctx.moveTo(ax,ay);
        ctx.lineTo(ax-Math.cos(ang-0.5)*hd, ay-Math.sin(ang-0.5)*hd);
        ctx.lineTo(ax-Math.cos(ang+0.5)*hd, ay-Math.sin(ang+0.5)*hd);
        ctx.closePath(); ctx.fill();
        if(l.rel){
          const mx=(sx+tx)/2, my=(sy+ty)/2;
          ctx.font="600 11px "+cssv("--font-mono");
          const w=ctx.measureText(l.rel).width;
          ctx.globalAlpha=0.95; ctx.fillStyle=cssv("--surface");
          ctx.fillRect(mx-w/2-4,my-8,w+8,16);
          ctx.fillStyle=cssv("--ink"); ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText(l.rel,mx,my);
        }
      }
    });
    ctx.globalAlpha=1;

    // nodes
    const many=G.nodes.length>60;
    const labelDegCut = many?7:(view==="schema"?6:4);
    const showAllLabels = (!many && tf.s>0.9) || tf.s>1.5;
    G.nodes.forEach(n=>{
      if(!nodeActive(n)) return;
      const [x,y]=toScreen(n); const r=radius(n)*tf.s;
      const dim=isDim(n);
      ctx.globalAlpha=dim?0.2:1;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=domColor(n.domain); ctx.fill();
      // 클래스(타입) 앵커는 흰 테두리를 굵게 + 점선 느낌으로 구분
      ctx.lineWidth=(n===focus)?3:(n.isClass?2.5:1.5);
      ctx.strokeStyle=(n===focus)?cssv("--ink"):(n.isClass?cssv("--ink-soft"):cssv("--surface"));
      ctx.stroke();
      // label
      const lab = n.label;
      const showLabel = !dim && (showAllLabels || n===focus || (nbr&&nbr.has(n)) || n.deg>=labelDegCut);
      if(showLabel){
        ctx.font=(n===focus?"700 ":"500 ")+ (view==="schema"?"12px ":"11.5px ")+cssv("--font-sans");
        ctx.textAlign="left"; ctx.textBaseline="middle";
        const tx=x+r+4;
        ctx.globalAlpha=dim?0.25:1;
        ctx.fillStyle=cssv("--ink");
        ctx.fillText(lab, tx, y);
      }
    });
    ctx.globalAlpha=1;
  }

  function loop(){
    if(alpha>0.02){ step(); }
    draw();
    if(alpha>0.02 || running===false){}
    rafId=requestAnimationFrame(loop);
  }
  function kick(){ alpha=Math.max(alpha,0.5); }

  // ---------- interaction ----------
  let drag=null, panning=null;
  function nodeAt(px,py){
    for(let i=G.nodes.length-1;i>=0;i--){
      const n=G.nodes[i]; if(!nodeActive(n))continue;
      const [x,y]=toScreen(n); const r=radius(n)*tf.s+4;
      if((px-x)**2+(py-y)**2<=r*r) return n;
    }
    return null;
  }
  function evtPos(e){ const r=cv.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }

  cv.addEventListener("pointerdown",e=>{
    cv.setPointerCapture(e.pointerId);
    const [px,py]=evtPos(e); const n=nodeAt(px,py);
    if(n){ drag={n, ox:0, oy:0}; n.fx=n.x; n.fy=n.y; cv.classList.add("grabbing"); }
    else { panning={px,py,tx:tf.x,ty:tf.y}; cv.classList.add("grabbing"); }
  });
  cv.addEventListener("pointermove",e=>{
    const [px,py]=evtPos(e);
    if(drag){ drag.n.fx=(px-tf.x)/tf.s; drag.n.fy=(py-tf.y)/tf.s; kick(); }
    else if(panning){ tf.x=panning.tx+(px-panning.px); tf.y=panning.ty+(py-panning.py); }
    else {
      const n=nodeAt(px,py);
      if(n!==hoverN){ hoverN=n; cv.style.cursor=n?"pointer":"grab"; }
    }
  });
  function endPtr(e){
    if(drag){ drag.n.fx=null; drag.n.fy=null; drag=null; }
    panning=null; cv.classList.remove("grabbing");
  }
  cv.addEventListener("pointerup",e=>{
    const [px,py]=evtPos(e);
    if(drag && Math.hypot(drag.n.x-((px-tf.x)/tf.s), drag.n.y-((py-tf.y)/tf.s))<3){
      selectNode(drag.n);
    } else if(!drag && panning && Math.hypot(px-panning.px,py-panning.py)<3){
      const n=nodeAt(px,py); selectNode(n);
    }
    endPtr(e);
  });
  cv.addEventListener("pointercancel",endPtr);
  cv.addEventListener("wheel",e=>{
    e.preventDefault();
    const [px,py]=evtPos(e);
    const f=Math.exp(-e.deltaY*0.0016);
    const ns=Math.max(0.35,Math.min(3,tf.s*f));
    tf.x=px-(px-tf.x)*(ns/tf.s); tf.y=py-(py-tf.y)*(ns/tf.s); tf.s=ns;
  },{passive:false});

  // ---------- detail panel ----------
  const dEl=document.getElementById("detail");
  function selectNode(n){
    selN=n;
    if(!n){ dEl.classList.remove("show"); return; }
    document.getElementById("dkind").textContent=(view==="schema"?"클래스":(n.isClass?"클래스(타입) 앵커":(n.cls||"인스턴스")));
    document.getElementById("dkind").style.color=domColor(n.domain);
    document.getElementById("dname").textContent=n.label;
    document.getElementById("ddesc").textContent=n.desc||"";
    const out=[],inc=[];
    G.links.forEach(l=>{
      if(!linkActive(l)) return;
      if(l.s===n) out.push(l);
      else if(l.t===n) inc.push(l);
    });
    let html="";
    if(out.length){
      html+='<div class="rel-h">이 노드가 가리키는 관계</div>';
      out.forEach(l=>{ html+=rowHTML(l.rel||(l.isa?"is-a":""), l.t, l.isa); });
    }
    if(inc.length){
      html+='<div class="rel-h">이 노드를 가리키는 관계</div>';
      inc.forEach(l=>{ html+=rowHTML(l.rel||(l.isa?"is-a":""), l.s, l.isa, true); });
    }
    document.getElementById("drels").innerHTML=html;
    dEl.classList.add("show");
  }
  function rowHTML(rel,other,isa,incoming){
    const arrow=incoming?"←":"→";
    const relTxt=isa?"is-a":rel;
    return '<div class="rel"><span class="rn">'+arrow+' '+relTxt+'</span>'+
           '<span class="rt">'+other.label+'</span></div>';
  }
  document.getElementById("dclose").addEventListener("click",()=>{selN=null;dEl.classList.remove("show");});

  // ---------- controls ----------
  document.querySelectorAll("#viewToggle button").forEach(b=>{
    b.addEventListener("click",()=>{
      document.querySelectorAll("#viewToggle button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      view=b.dataset.v; G=GRAPHS[view]; selN=null; hoverN=null; dEl.classList.remove("show");
      seed(); alpha=1; updCount();
    });
  });
  document.getElementById("resetBtn").addEventListener("click",()=>{ seed(); alpha=1; selN=null; dEl.classList.remove("show"); });
  document.getElementById("typeToggle").addEventListener("change",e=>{
    showTypes=e.target.checked; selN=null; hoverN=null; dEl.classList.remove("show"); kick(); updCount();
  });
  document.getElementById("strategyToggle").addEventListener("change",e=>{
    showStrategyDetails=e.target.checked; selN=null; hoverN=null; dEl.classList.remove("show"); seed(); alpha=1; updCount();
  });

  function updCount(){
    const nn=G.nodes.filter(nodeActive).length;
    const ll=G.links.filter(linkActive).length;
    document.getElementById("cnt").textContent=nn+"개 노드 · "+ll+"개 관계";
  }
  // legend
  const legEl=document.getElementById("legend");
  Object.keys(DOMAINS).forEach(d=>{
    const el=document.createElement("div"); el.className="lg";
    el.innerHTML='<span class="sw" style="background:'+domColor(d)+'"></span>'+DOMAINS[d].ko;
    el.addEventListener("click",()=>{
      if(hiddenDom.has(d)){hiddenDom.delete(d);el.classList.remove("off");}
      else{hiddenDom.add(d);el.classList.add("off");}
    });
    legEl.appendChild(el);
  });

  window.addEventListener("resize",resize);
  // theme change repaint (colors are read live, so just ensure a repaint happens)
  window.matchMedia("(prefers-color-scheme:dark)").addEventListener("change",()=>{});

  // ---------- expose API for the query console tab ----------
  window.RLWRLD = {
    DOMAINS: DOMAINS,
    data: function(){ return GRAPHS.instance; },
    refresh: function(){ resize(); kick(); },
    focusInstance: function(id){
      document.querySelectorAll("#viewToggle button").forEach(function(x){ x.classList.toggle("on", x.dataset.v==="instance"); });
      view="instance"; G=GRAPHS.instance; hoverN=null; seed(); alpha=1; updCount();
      resize();
      var n=G.byId[id]; if(n) selectNode(n);
    }
  };

  resize(); seed(); updCount(); loop();
})();
</script>
<script>
(function(){
  var vg=document.getElementById("view-graph"), vl=document.getElementById("view-lineage"), fr=document.getElementById("lf-frame");
  var btns=document.querySelectorAll("#modeSwitch button");
  btns.forEach(function(b){ b.onclick=function(){
    var m=b.getAttribute("data-mode");
    btns.forEach(function(x){ x.classList.toggle("on", x===b); });
    vg.classList.toggle("on", m==="graph");
    vl.classList.toggle("on", m==="lineage");
    if(m==="lineage" && !fr.getAttribute("src")) fr.setAttribute("src","lineage-flow.html");
  };});
})();
</script>
</body>
