<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RLWRLD Ontology — Data Lineage Flow</title>
<style>
  :root{
    --bg:#f5f7fa; --surface:#ffffff; --surface-2:#eef1f6;
    --ink:#141d2b; --ink-soft:#54627a; --ink-faint:#8b98ad; --line:#d6dce6; --accent:#245fd0;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    --font-mono:ui-monospace,"SF Mono","Menlo","Consolas",monospace;
    --d-business:#3b74e8; --d-tech:#12a69c; --d-ecosystem:#e07b2f;
    --d-market:#c65ca0; --d-comms:#8b62d6; --d-ops:#6f7d90;
    --d-sources:#3fa45f; --d-strategy:#db4b4b; --d-org:#c99a1e;
    --cad-daily:#db4b4b; --cad-weekly:#3b74e8; --cad-monthly:#3fa45f; --cad-adhoc:#8b98ad;
    --edge:#b9c2cf;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#0c1119;--surface:#141c27;--surface-2:#1b2430;--ink:#e9eef5;--ink-soft:#97a5ba;--ink-faint:#6a788d;--line:#28323f;--accent:#6fa4ff;--edge:#3a4655;}
  }
  :root[data-theme="light"]{--bg:#f5f7fa;--surface:#ffffff;--surface-2:#eef1f6;--ink:#141d2b;--ink-soft:#54627a;--ink-faint:#8b98ad;--line:#d6dce6;--accent:#245fd0;--edge:#b9c2cf;}
  :root[data-theme="dark"]{--bg:#0c1119;--surface:#141c27;--surface-2:#1b2430;--ink:#e9eef5;--ink-soft:#97a5ba;--ink-faint:#6a788d;--line:#28323f;--accent:#6fa4ff;--edge:#3a4655;}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-sans);display:flex;flex-direction:column;overflow:hidden}
  header.top{padding:12px clamp(14px,3vw,26px);border-bottom:1px solid var(--line);background:var(--surface);position:relative;z-index:3}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 3px}
  header.top h1{font-size:clamp(17px,2.6vw,21px);margin:0}
  header.top p{margin:3px 0 0;color:var(--ink-soft);font-size:12.5px}
  header.top .back{position:absolute;right:clamp(14px,3vw,26px);top:12px;font-size:12.5px;color:var(--ink-faint);text-decoration:none}
  header.top .back:hover{color:var(--accent)}
  .bar{display:flex;gap:14px;flex-wrap:wrap;margin-top:9px;font-size:11.5px;color:var(--ink-soft);align-items:center}
  .bar b{color:var(--ink);font-weight:600}
  .sw{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:3px}
  .cadsw{width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:-1px;margin-right:3px}
  .btn{border:1px solid var(--line);background:var(--surface-2);color:var(--ink-soft);font:inherit;font-size:11.5px;padding:4px 10px;border-radius:7px;cursor:pointer}
  .btn:hover{border-color:var(--accent);color:var(--ink)}
  .search input{padding:6px 9px;border:1px solid var(--line);border-radius:7px;background:var(--surface);color:var(--ink);font:inherit;font-size:12px;width:180px}

  .wrap{flex:1;position:relative;overflow:hidden;cursor:grab}
  .wrap.grabbing{cursor:grabbing}
  .stage{position:absolute;top:0;left:0;transform-origin:0 0}
  svg.edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  .node{position:absolute;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:6px 10px;font-size:12px;line-height:1.25;cursor:pointer;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05);display:flex;align-items:center;gap:7px}
  .node .body{min-width:0;flex:1}
  .node .lab{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .node .sub{color:var(--ink-faint);font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .node .car{font-size:10px;color:var(--ink-faint);flex:none;width:12px;text-align:center}
  .node .pill{flex:none;font-size:10.5px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  .node.provider{background:var(--surface-2);font-weight:700}
  .node.domain{color:#fff;border:none;font-weight:700}
  .node.domain .sub,.node.domain .car,.node.domain .pill{color:rgba(255,255,255,.82)}
  .node.source{border-left:4px solid var(--ink-faint)}
  .node.source .sub{font-family:var(--font-mono)}
  .node.klass{border-left:4px solid var(--accent)}
  .node.inst{font-size:11px;background:var(--surface-2)}
  .node.inst .sub{font-family:var(--font-mono)}
  .node.inst::after{content:"›";position:absolute;right:6px;color:var(--ink-faint);font-weight:700}
  .node.more{background:transparent;border-style:dashed;color:var(--accent);justify-content:center;font-weight:600}
  .node.dim{opacity:.14}
  .node.hot{box-shadow:0 0 0 2px var(--accent);z-index:2}
  .ctrls{position:absolute;left:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:3}
  .ctrls button{width:34px;height:34px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:8px;font-size:16px;cursor:pointer}
  .ctrls button:hover{border-color:var(--accent)}
  .colhdr{position:absolute;top:0;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .hint{position:absolute;right:14px;bottom:12px;font-size:11px;color:var(--ink-faint);z-index:3;background:var(--surface);padding:4px 9px;border:1px solid var(--line);border-radius:7px}

  .drawer{position:absolute;top:0;right:0;height:100%;width:min(430px,86vw);background:var(--surface);border-left:1px solid var(--line);box-shadow:-6px 0 20px rgba(0,0,0,.10);transform:translateX(101%);transition:transform .18s ease;z-index:6;overflow-y:auto;padding:16px 18px}
  .drawer.open{transform:none}
  .drawer .x{position:absolute;right:12px;top:12px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:15px;line-height:1}
  .drawer .cbadge{display:inline-block;font-size:10.5px;font-weight:700;color:#fff;padding:2px 9px;border-radius:20px;margin-bottom:8px}
  .drawer h2{font-size:15px;margin:0 44px 4px 0;line-height:1.3;word-break:break-word}
  .drawer .did{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-faint);word-break:break-all;margin-bottom:6px}
  .drawer .pk{color:var(--ink-faint);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-top:11px}
  .drawer .pv{font-size:12.5px;white-space:pre-wrap;word-break:break-word;margin-top:2px}
  .drawer .meta{margin-top:14px;border-top:1px solid var(--line);padding-top:10px;font-size:11.5px;color:var(--ink-soft)}
  .drawer .src{font-family:var(--font-mono);font-size:11px;word-break:break-all;color:var(--ink-soft)}
</style>
</head>

<header class="top">
  <a class="back" href="index.html">← Artifacts</a>
  <p class="eyebrow">RLWRLD Ontology</p>
  <h1>Data Lineage Flow</h1>
  <p>기본은 <b>원 시스템 → 도메인</b> 요약. 노드를 클릭해 펼치면 시스템→소스, 도메인→클래스, 클래스→인스턴스로 드릴다운합니다. <b>인스턴스를 클릭하면 그 내용·프로퍼티</b>가 오른쪽 패널에 뜹니다.</p>
  <div class="bar">
    <button class="btn" id="expP">시스템 모두 펼치기</button>
    <button class="btn" id="expD">도메인 모두 펼치기</button>
    <button class="btn" id="collapse">모두 접기</button>
    <span class="search"><input id="q" type="search" placeholder="소스·클래스 검색 후 Enter" autocomplete="off"></span>
    <span><span class="sw" style="background:var(--accent)"></span><b>클래스</b> · 도메인=채운 노드</span>
    <span>소스 주기:
      <span class="cadsw" style="background:var(--cad-daily)"></span>d
      <span class="cadsw" style="background:var(--cad-weekly)"></span>w
      <span class="cadsw" style="background:var(--cad-monthly)"></span>m
      <span class="cadsw" style="background:var(--cad-adhoc)"></span>a</span>
    <span id="stat" style="margin-left:auto"></span>
  </div>
</header>

<div class="wrap" id="wrap">
  <div class="stage" id="stage"><svg class="edges" id="edges"></svg></div>
  <div class="ctrls"><button id="zin">＋</button><button id="zout">－</button><button id="fit" title="전체 보기">⤢</button></div>
  <div class="hint">드래그=이동 · 휠=확대/축소 · 노드 클릭=펼치기 · 인스턴스 클릭=상세 · 호버=계보 강조</div>
  <aside class="drawer" id="drawer"></aside>
</div>

(30K→148K, 5x, RoboCurate avg 13.9→38.9%) 확보. (4) 경쟁사 밸류(Skild $14B·PI $11B·Field AI $2B) 확보."},{"k":"_deck_facts","v":"market_claims: enterprise_discussions: 200+ · labor_to_automate_usd: 4T+ · atomic_tasks: 18 · jp_kr_labor_market_usd: 500B · corporations_engaged: 200+/10+ · model_benchmark_20260507: vla_arena_rank: 1 · vla_arena_score: 4.67 · libero: 97.8 · libero_plus: 86.7 · simpler_google_vm: 82 · simpler_google_va: 77 · simpler_widowx: 72 · robocasa_gr1_tabletop: 59 · robocasa365_avg: 36 · beats: GR00T N1.6, GR00T N1.5, pi0-FAST, pi0.5, pi0 · data_flywheel: real_episodes: 30K · synthetic_episodes: 148K · multiplier: 5x · robocurate_avg_success_pct: 38.9 · dreamgen_avg_success_pct: 27.8 · real_avg_success_pct: 13.9 · business_model: phase1_rx_blueprinting_usd: 0.3-1M · phase2_data_partnership_usd: 1-10M · phase3_laas_usd: 200M-2B+ · fuji_unit_econ_usd: 640M · kddi_unit_econ_usd: 960M · competitor_valu"}]},{"id":"narrative-business-industry-dexterity","class":"Narrative","label":"narrative-business-industry-dexterity","sourcedFrom":["gdrive/decks"],"confidence":"확인","lastConfirmedAt":"2026-07-11","props":[{"k":"narrativeType","v":"biz"},{"k":"audience","v":"고객"},{"k":"version","v":"Business deck body v0.1"},{"k":"updatedAt","v":"2026-07-11"},{"k":"keyMessages","v":"Industry automation's last mile is dexterity: high automation aspiration remains blocked by hand-based, variable physical tasks., Industry-level dexterity is decomposed into cognitive sequencing and recovery, dynamic force modulation, reactive grasp, and stable geometric grasp across manufacturing, logistics, and services., RLWRLD's solution is 5-finger-oriented 4D+ capture of natural human skills from work sites, feeding RLDX, a VLA specialized in 5-finger dexterity., The business model emphasizes differentiated corporate partnerships in Japan and Korea, quality skilled-labor access, humanoid adoption readiness, and 3-to-5-year long-term partnerships., Commercial proof points are framed as 200+ ente 착수를 위한 선행 산출물 확정. 이후 KDDI와 태스크·환경 협의 후 4가지 패턴 샘플 촬영 및 사내 셋업 결정 단계로 이어짐."},{"k":"domain","v":"partnership"},{"k":"decidedOn","v":"2026-07-08"},{"k":"status","v":"결정됨"},{"k":"owner","v":"person-jihoon-lee"},{"k":"relatedTo","v":"account-kddi-lawson"},{"k":"sourceChannel","v":"#proj_poc_kddi_nedo"},{"k":"verifiedNote","v":"Reply26(07-08 21:47:55) '그럼 해당 내용 KDDI에 전달토록 하겠습니다'로 명확 확정; Reply25 사내 검토 완료·Reply24에 일본어 번역 후 전달 및 4패턴 샘플 촬영 후 사내협의 순서 모두 원문과 일치."}]},{"id":"dec-slk-067","class":"Decision","label":"NVIDIA 협업 3대 트랙 및 진행 우선순위 확정","sourcedFrom":["slack/proj_nvidia_int"],"confidence":"확인","lastConfirmedAt":"2026-07-11","props":[{"k":"title","v":"NVIDIA 협업 3대 트랙 및 진행 우선순위 확정"},{"k":"decisionType","v":"Accept"},{"k":"summary","v":"RLWRLD×NVIDIA 협업을 1) Industry-Standard Dexterity Benchmark 공동개발, 2) Robotics Dexterity Data Pipeline 표준화, 3) Joint Research 세 트랙으로 구성하고 Benchmark→Standardization→Joint Research 순으로 우선순위를 두어 진행하기로 확정. Benchmark는 즉시 착수. 방향성은 이미 NVIDIA 내부 임원 보고·엔도스먼트까지 완료되어 합의된 상태로 명시."},{"k":"rationale","v":"지난주 양사 제안 미팅 후 NVIDIA 내부 임원 보고까지 완료되어 방향성 합의는 종료. 세 안건 중 NVIDIA 반응이 가장 강했던 Benchmark를 최우선으로 즉시 착수. 'Standards are set by whoever ships first' 관점에서 실행 속도 강조."},{"k":"roadmapImpact","v":"Dexterous Manipulation De Facto Standard 선점을 목표로 한 NVIDIA 협업의 기본 골격과 실행 순서를 규정. DexBench(벤치마크)가 최우선 워크스트림으로 확정."},{"k":"domain","v":"partnership"},{"k":"decidedOn","v":"2026-04-22"},{"k":"status","v":"결정됨"},{"k":"owner","v":"person-ilgyu-shin"},{"k":"relatedTo","v":"partnership-nvidia"},{"k":"sourceChannel","v":"#proj_nvidia_int"},{"k":"verifiedNote","v":"4/22 신일규 창설 메시지에 3대 트랙 명시 + 'Benchmark → Standardization → Joint Research 순으로 우선순위', 'Benchmark는 즉시 착수', 'NVIDIA 내부 임원 보고까지 완료...강한 공감대와 Endorsement' 원문 그대로 확인."}]},{"id":"dec-slk-068","class":"Decision","label":"협업 트랙별 Technical Champion(기술 담당) 지정","sourcedFrom":["slack/proj_nvidia_int"],"confidence":"확인","lastConfirmedAt":"2026-07-11","props":[{"k":"title","v":"협업 트랙별 Technical Champion(기술 담당) 지정"},{"k":"decisionType","v":"Accept"},{"k":"summary","v":"NVIDIA 협업 3개 아젠다별 Technical Champion 겸 Communication Gateway를 지정: 1) Benchmark 공동개발=Junho Cho(Jacey), 2) Data Pipeline 표준화=Seungcheol Park(승철), 3) Joint Research=Seungjun Moon(승준). 각자 기술 요소 검토·미팅 참여·팀내 협업 담당."},{"k":"rationale","v":"세 협업 아젠다 각각에 기술 검토와 대외 커뮤니케이션을 책임질 담당자를 배정해 실무 R&R을 명확화. 2번은 hk·Storm과, 3번은 신진우 교수와 협업하도록 지정."},{"k":"roadmapImpact","v":"NVIDIA 협업 각 트랙의 실무 오너십 확정으로 실행 체계 가동."},{"k":"domain","v":"ops"},{"k":"decidedOn","v":"2026-04-22"},{"k":"status","v":"결정됨"},{"k":"owner","v":"person-hyungkyu-ryu"},{"k":"relatedTo","v":"partnership-nvidia"},{"k":"sourceChannel","v":"#proj_nvidia_int"},{"k":"verifiedNote","v":"4/22 Hyungkyu Ryu(hk) 메시지에 '1.Benchmark=Junho Cho(Jacey), 2.Data Pipeline=Seungcheol Park(승철), 3.Joint Research=Seungjun Moon(승준) ... Technical Champion (and Communication Gateway)"}]},{"id":"dec-slk-069","class":"Decision","label":"DexBench Ver1 우선순위 4개 Task 영역 결정","sourcedFrom":["slack/proj_nvidia_int"],"confidence":"확인","lastConfirmedAt":"2026-07-11","props":[{"k":"title","v":"DexBench Ver1 우선순위 4개 Task 영역 결정"},{"k":"decisionType","v":"Accept"},{"k":"summary","v":"18개 태스크를 한 번에 구현할 리소스가 없어, 지난주 미팅에서 DexBench Ver1의 우선순위 4개 Task 영역을 확정: T0 Special Picking, T03 Precision Insertion/Placing, T16 Tool-Use, T17 Moving Object Interaction. 산업 관련성·dexterity 커버리지·시뮬 구현 적합성 기준으로 선정, 우선 런칭 후 확장."},{"k":"rationale","v":"한정된 리소스 하에서 산업 대표성과 5-finger hand 차별성을 드러낼 수 있는 우선순위 태스크로 먼저 벤치마크를 런칭하고 이후 확장하는 전략. NVIDIA 첫 실무 세션(5/15) 스코프 정렬용으로 확정."},{"k":"roadmapImpact","v":"DexBench MVP 스코프의 기준선. 이후 상세 시나리오·환경 설계의 출발점."},{"k":"domain","v":"product-biz"},{"k":"decidedOn","v":"2026-05-11"},{"k":"status","v":"결정됨"},{"k":"owner","v":"person-ilgyu-shin"},{"k":"relatedTo","v":"partnership-nvidia"},{"k":"sourceChannel","v":"#proj_nvidia_int"},{"k":"verifiedNote","v":"5/11 신일규 아젠다 메시지 '지난 주 미팅 통해 하기 4가지의 우선순위 Task 영역들을 결정' + T0 Special Picking/T03 Precision Insertion/T16 Tool-Use/T17 Moving Object Interaction, 18개 태스크 리소스 제약 및 3대 선정 기준 원문 일치."}]}  libero: 97.8 · libero_plus: 86.7 · simpler_google_vm: 82 · simpler_google_va: 77 · simpler_widowx: 72 · robocasa_gr1_tabletop: 59 · robocasa365_avg: 36 · baselines_beaten: GR00T N1.6, GR00T N1.5, pi0-FAST, pi0.5, pi0 · attribution: RLWRLD / KAIST · data_augmentation: RoboCurate(자체) — Real 30K → Generate/Verify/Curate → Synthetic 148K(5x). avg 성공률 13.9→38.9%(+DreamGen 27.8% 상회)"},{"k":"_confirm","v":"[부분해소 2026-07-12] 아키텍처·공개벤치는 IR 4.2.2 덱으로 확정. G0는 RLDX의 ModelRelease로 정규화. 남은 것: 파라미터 규모, 내부 실측 벤치와 덱 공개수치의 일치 여부."}]},{"id":"model-rfm-backbone","class":"ResearchTrack","label":"model-rfm-backbone","sourcedFrom":["notion/vlab-meeting-notes-db","slack/proj_subgroup_rfm_backbone","slack/proj_subgroup_faster-vla"],"confidence":"확인","lastConfirmedAt":"2026-07-10","props":[{"k":"trackType","v":"Backbone"},{"k":"status","v":"진행중"},{"k":"architectureNote","v":"RFM/VLA 백본 트랙. VLM 백본 위에 action head를 얹는 구조. ★VLM 백본: GR00T의 Eagle을 검토했으나 '라이선스 이슈 가능성'으로 Florence 등 대안 검토 중('VLA 모델 실험 계획' 원천 — Q17 라이선스 이슈의 실체). 실험 기법(동 원천): History-aware VLA(컨베이어 PnP), Diffusion Policy·PI π0.5 baseline(GR1 tabletop), Latent Action(FLARE), Cotraining(AWB+EgoDex+GR1), Soft prompting(cross-embodiment), Modality Addition (Allex torque/tactile), LoRA fine-tuning(X-VLA), Hierarchical VLA. Faster VLA 서브그룹이 추론 가속, Research Engineering(6/25 킥오프)이 backbone VLM 업그레이드를 담당.\n"},{"k":"links","v":"comparableTo: comp-nvidia-groot, comp-physical-intelligence · feedsInto: model-rldx-1 · relatedProject: rp-rfm-backbone, rp-faster-vla, rp-research-engineering · relatedTechArea: ta-cloud-rfm-inference"},{"k":"note","v":"단일 배포모델 아님(백본/연구트랙). 서브그룹 rp-rfm-backbone·rp-faster-vla·rp-research-engineering. 근거: mtg-vlab-2026-04-16/07-07b. IR 4.2.2 덱(S13)은 이 백본을 'RLDX-1-VLM'(Video·Language·Cognition 입력) + Multi-Stream Action Transformer로 대외 표현 → model-rldx-1._deck_confirmed와 동일 아키텍처"},{"k":"_confirm","v":"현재 채택 VLM 베이스 확정(Eagle 유지 vs Florence 전환), 백본 파라미터 규모 — 덱은 명시 안 함(대외 아키텍처 다이어그램만)"}]},{"id":"model-g1-worldmodel","class":"ResearchTrack","label":"model-g1-worldmodel","sourcedFrom":["notion/vlab-meeting-notes-db","local/[RLWRLD] IR Deck-teaser_4.2.2.pdf"],"confidence":"추정","lastConfirmedAt":"2026-07-11","props":[{"k":"trackType","v":"WorldModel"},{"k":"status","v":"진행중"},{"k":"architectureNote","v":"World Model 트랙 — G0 VLA의 후속 세대(G1)로 World Model을 결합하는 방향. 4D Perception + 4D+ 데이터와 연계. VLab 정기회의에 지속 등장: 'World Models, 4D Perception, Robot Data'(2/5), 'G1 World Models'(3/5), '4D+ World Model, Dexterous VLA'(4/2), 'PointPolicy, 4D+, Multi-View Augmentation'(4/30), 'Virtual Lab RLDX Subgroups, World Models'(6/19), '4D+ Data Subgroup'(7/7). 조민수 랩(3D/4D Perception)과 연계.\n"},{"k":"links","v":"comparableTo: comp-nvidia-groot, comp-1x, comp-genesis-ai · relatedTechArea: ta-world-model · feedsInto: model-rldx-1 · ledBy: person-mscho"},{"k":"note","v":"이전 v0.1에서 '국책단계'로 보류했으나, VLab 회의록상 2/5부터 활발한 내부 연구트랙임이 확인되어 신규 등재. 국책(natl-5d-worldmodel)과는 별개의 내부 라인. 근거: mtg-vlab-2026-02-05/03-05/04-02/04-30/07-07. IR 4.2.2 덱(S14) 로드맵상 World Model Core는 2027 Q1 Modular VLA(VLM·Video·4D+ Data World Model) → 2028 Q1 Full E2E(Synthetic Data·Neural Trajectories) → 2029 Q1 Simulation-Based 순으로 배포 성숙도에 정렬"},{"k":"_confirm","v":"G1이 독립 모델인지 G0의 World Model 확장인지, 4D+ 데이터 파이프라인 성숙도 — mscho(조민수 랩)·4D+ Data 서브그룹"}]}]}</script><!-- /datalake-data -->
<script>
(function(){
  "use strict";
  const DATA=JSON.parse(document.getElementById("datalake-data").textContent||"{}");
  const sources=DATA.sources||[], classes=DATA.classes||[], instances=DATA.instances||[];
  const cssv=(v)=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const domColor=(d)=>cssv("--d-"+(d||"org"))||cssv("--ink-faint");
  const esc=(s)=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const DOMAINS=["business","tech","ecosystem","market","comms","ops","sources","strategy","org"];
  const N_TOP=6;

  const srcById={}; sources.forEach(s=>srcById[s.id]=s);
  const clsByName={}; classes.forEach(c=>clsByName[c.name]=c);
  const instById={}; instances.forEach(i=>instById[i.id]=i);
  const domainOf=(cls)=>{const c=clsByName[cls]; return (c&&c.domain)||"org";};
  const provOf=(sid)=>{const i=sid.indexOf("/"); return i>=0?sid.slice(0,i):sid;};

  const scCount={}; const clsInsts={}; classes.forEach(c=>clsInsts[c.name]=[]);
  instances.forEach(i=>{
    (clsInsts[i.class]=clsInsts[i.class]||[]).push(i.id);
    (i.sourcedFrom||[]).forEach(sid=>{const k=sid+"|"+i.class; scCount[k]=(scCount[k]||0)+1;});
  });
  Object.values(clsInsts).forEach(a=>a.sort((x,y)=>{const A=instById[x],B=instById[y];return (B.lastConfirmedAt||"").localeCompare(A.lastConfirmedAt||"")||A.id.localeCompare(B.id);}));
  const triples=Object.keys(scCount).map(k=>{const [sid,cls]=k.split("|"); return [sid,cls,scCount[k]];});

  const sourcesByProv={}; sources.forEach(s=>{(sourcesByProv[provOf(s.id)]=sourcesByProv[provOf(s.id)]||[]).push(s);});
  const srcInflow={}; sources.forEach(s=>srcInflow[s.id]=0);
  triples.forEach(([sid,,c])=>{ if(sid in srcInflow) srcInflow[sid]+=c; });
  const provInflow={}; Object.keys(sourcesByProv).forEach(p=>provInflow[p]=sourcesByProv[p].reduce((a,s)=>a+srcInflow[s.id],0));
  const domInflow={}; DOMAINS.forEach(d=>domInflow[d]=0);
  triples.forEach(([,cls,c])=>{const d=domainOf(cls); domInflow[d]=(domInflow[d]||0)+c;});
  const domsPresent=DOMAINS.filter(d=>classes.some(c=>c.domain===d));
  const clsInflow={}; classes.forEach(c=>clsInflow[c.name]=0);
  triples.forEach(([,cls,c])=>{clsInflow[cls]=(clsInflow[cls]||0)+c;});

  const expP=new Set(), expD=new Set(), showInst=new Set(), fullCls=new Set();

  const X={prov:24, src:190, type:560, inst:830};
  const W={prov:150, src:300, type:230, inst:300};
  const HEAD=26;
  let nodes=[], edges=[], NB={}, ADJ={}, bounds={w:1200,h:700};

  function layout(){
    nodes=[]; edges=[]; NB={};
    const add=(n)=>{nodes.push(n); NB[n.id]=n; return n;};
    let ty=HEAD+6;
    const provOrder=Object.keys(sourcesByProv).sort((a,b)=>provInflow[b]-provInflow[a]||a.localeCompare(b));
    domsPresent.sort((a,b)=>DOMAINS.indexOf(a)-DOMAINS.indexOf(b));
    domsPresent.forEach(dom=>{
      if(expD.has(dom)){
        const cls=classes.filter(c=>c.domain===dom).sort((a,b)=>clsInflow[b.name]-clsInflow[a.name]||a.name.localeCompare(b.name));
        cls.forEach(c=>{
          const blockTop=ty;
          if(showInst.has(c.name)){
            const all=clsInsts[c.name]||[];
            const shown=fullCls.has(c.name)?all:all.slice(0,N_TOP);
            shown.forEach(id=>{const it=instById[id]; add({id:"i:"+id,kind:"inst",iid:id,label:it.label||id,sub:id,x:X.inst,y:ty,w:W.inst,h:24,dom});ty+=30;});
            if(!fullCls.has(c.name)&&all.length>N_TOP){ add({id:"m:"+c.name,kind:"more",label:"+"+(all.length-N_TOP)+" 더보기",x:X.inst,y:ty,w:W.inst,h:24,cls:c.name}); ty+=30; }
          }
          const cy=showInst.has(c.name)? (blockTop+ty-30)/2 : ty;
          add({id:"c:"+c.name,kind:"klass",label:c.name,sub:c.domain,x:X.type,y:Math.max(HEAD+6,cy),w:W.type,h:32,dom,cls:c.name,count:clsInsts[c.name].length,car:(clsInsts[c.name].length?(showInst.has(c.name)?"▾":"▸"):"")});
          if(showInst.has(c.name)){
            const all=clsInsts[c.name]||[]; const shown=fullCls.has(c.name)?all:all.slice(0,N_TOP);
            shown.forEach(id=>edges.push({from:"c:"+c.name,to:"i:"+id,w:0.7,kind:"ci"}));
            if(!fullCls.has(c.name)&&all.length>N_TOP) edges.push({from:"c:"+c.name,to:"m:"+c.name,w:0.7,kind:"ci",dash:true});
          } else ty+=38;
        });
      } else {
        add({id:"d:"+dom,kind:"domain",label:dom,sub:classes.filter(c=>c.domain===dom).length+" cls",x:X.type,y:ty,w:W.type,h:34,dom,car:"▸",count:domInflow[dom]});
        ty+=44;
      }
    });
    let sy=HEAD+6;
    provOrder.forEach(p=>{
      if(expP.has(p)){
        const list=sourcesByProv[p].slice().sort((a,b)=>srcInflow[b.id]-srcInflow[a.id]||a.id.localeCompare(b.id));
        const top=sy;
        list.forEach(s=>{ add({id:"s:"+s.id,kind:"source",label:s.id.split("/").slice(1).join("/")||s.id,sub:s.kind+(s.cadence?(" · "+s.cadence):""),x:X.src,y:sy,w:W.src,h:32,cad:s.cadence?("--cad-"+s.cadence):null,srcId:s.id}); sy+=40; });
        const py=(top+sy-40)/2;
        add({id:"p:"+p,kind:"provider",label:p,sub:list.length+" src",x:X.prov,y:Math.max(HEAD+6,py),w:W.prov,h:32,prov:p,car:"▾"});
        list.forEach(s=>edges.push({from:"p:"+p,to:"s:"+s.id,w:0.6,kind:"ps"}));
      } else {
        add({id:"p:"+p,kind:"provider",label:p,sub:sourcesByProv[p].length+" src · "+provInflow[p],x:X.prov,y:sy,w:W.prov,h:32,prov:p,car:"▸"});
        sy+=44;
      }
    });
    const agg={};
    triples.forEach(([sid,cls,cnt])=>{
      const p=provOf(sid);
      const left = expP.has(p)? ("s:"+sid) : ("p:"+p);
      const dom=domainOf(cls);
      const right = expD.has(dom)? ("c:"+cls) : ("d:"+dom);
      if(!NB[left]||!NB[right]) return;
      const k=left+">"+right; agg[k]=(agg[k]||0)+cnt;
    });
    Object.keys(agg).forEach(k=>{const [a,b]=k.split(">"); edges.push({from:a,to:b,w:Math.min(7,0.8+Math.log(1+agg[k])),kind:"flow",count:agg[k]});});
    bounds={w:X.inst+W.inst+50, h:Math.max(ty,sy)+30};
    ADJ={}; nodes.forEach(n=>ADJ[n.id]=[]);
    edges.forEach((e,idx)=>{ if(ADJ[e.from]&&ADJ[e.to]){ADJ[e.from].push({to:e.to,idx});ADJ[e.to].push({to:e.from,idx});} });
  }

  const stage=document.getElementById("stage"), svg=document.getElementById("edges");
  function render(){
    stage.querySelectorAll(".node,.colhdr").forEach(n=>n.remove()); svg.innerHTML="";
    svg.setAttribute("width",bounds.w); svg.setAttribute("height",bounds.h);
    [["prov","원 시스템"],["src","소스"],["type","도메인 / 클래스"],["inst","인스턴스"]].forEach(([key,t])=>{const h=document.createElement("div");h.className="colhdr";h.textContent=t;h.style.left=X[key]+"px";h.style.width=W[key]+"px";stage.appendChild(h);});
    const ef=document.createDocumentFragment();
    edges.forEach((e)=>{const a=NB[e.from],b=NB[e.to]; if(!a||!b)return;
      const x1=a.x+a.w,y1=a.y+a.h/2,x2=b.x,y2=b.y+b.h/2,mx=(x1+x2)/2;
      const p=document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d",`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`); p.setAttribute("fill","none");
      p.setAttribute("stroke", e.kind==="flow"? domColor(b.dom): cssv("--edge"));
      p.setAttribute("stroke-width",e.w); p.setAttribute("opacity", e.kind==="flow"?0.5:0.32);
      if(e.dash)p.setAttribute("stroke-dasharray","4,4"); e._el=p; ef.appendChild(p);
    });
    svg.appendChild(ef);
    const nf=document.createDocumentFragment();
    nodes.forEach(n=>{
      const d=document.createElement("div"); d.className="node "+n.kind;
      d.style.left=n.x+"px"; d.style.top=n.y+"px"; d.style.width=n.w+"px"; d.style.minHeight=n.h+"px";
      if(n.kind==="source"&&n.cad)d.style.borderLeftColor=cssv(n.cad);
      if(n.kind==="klass")d.style.borderLeftColor=domColor(n.dom);
      if(n.kind==="inst")d.style.borderLeft="3px solid "+domColor(n.dom);
      if(n.kind==="domain")d.style.background=domColor(n.dom);
      if(n.car){const c=document.createElement("span");c.className="car";c.textContent=n.car;d.appendChild(c);}
      const bd=document.createElement("div");bd.className="body";
      const lab=document.createElement("div");lab.className="lab";lab.textContent=n.label;bd.appendChild(lab);
      if(n.sub){const s=document.createElement("div");s.className="sub";s.textContent=n.sub;bd.appendChild(s);}
      d.appendChild(bd);
      if(n.count!=null&&n.kind!=="more"){const pl=document.createElement("span");pl.className="pill";pl.textContent=n.count;d.appendChild(pl);}
      d.title=(n.sub?n.sub+"\n":"")+n.label;
      n._el=d;
      d.onclick=(ev)=>{ev.stopPropagation(); onClick(n);};
      d.addEventListener("mouseenter",()=>hi(n.id));
      d.addEventListener("mouseleave",clearHi);
      nf.appendChild(d);
    });
    stage.appendChild(nf);
    document.getElementById("stat").textContent=nodes.length+" 노드 · "+edges.length+" 엣지";
  }
  function refresh(){ layout(); render(); }

  function onClick(n){
    if(n.kind==="provider"){ if(n.prov)(expP.has(n.prov)?expP.delete(n.prov):expP.add(n.prov)); refresh(); }
    else if(n.kind==="domain"){ expD.add(n.dom); refresh(); }
    else if(n.kind==="klass"){ if(!clsInsts[n.cls].length)return; if(showInst.has(n.cls)){showInst.delete(n.cls);fullCls.delete(n.cls);}else showInst.add(n.cls); refresh(); }
    else if(n.kind==="more"){ fullCls.add(n.cls); refresh(); }
    else if(n.kind==="inst"){ openDrawer(n.iid); }
  }

  // ---- instance detail drawer ----
  const drawer=document.getElementById("drawer");
  function openDrawer(iid){
    const it=instById[iid]; if(!it)return;
    const dom=(clsByName[it.class]||{}).domain;
    let h='<button class="x" id="drawerX" title="닫기">×</button>';
    h+='<span class="cbadge" style="background:'+esc(domColor(dom))+'">'+esc(it.class)+'</span>';
    h+='<h2>'+esc(it.label||iid)+'</h2>';
    h+='<div class="did">'+esc(iid)+'</div>';
    (it.props||[]).forEach(p=>{ if(p.v==="")return; h+='<div class="pk">'+esc(p.k)+'</div><div class="pv">'+esc(p.v)+'</div>'; });
    h+='<div class="meta">';
    h+='<div class="pk">신뢰도 · 확인일</div><div class="pv">'+esc(it.confidence||"—")+' · '+esc(it.lastConfirmedAt||"—")+'</div>';
    h+='<div class="pk">sourcedFrom</div>';
    (it.sourcedFrom||[]).forEach(s=>{h+='<div class="src">'+esc(s)+'</div>';});
    h+='</div>';
    drawer.innerHTML=h; drawer.classList.add("open");
    document.getElementById("drawerX").onclick=closeDrawer;
  }
  function closeDrawer(){ drawer.classList.remove("open"); }
  window.addEventListener("keydown",(e)=>{ if(e.key==="Escape")closeDrawer(); });

  function hi(id){
    const seen=new Set([id]),ke=new Set(),st=[id];
    while(st.length){const c=st.pop();(ADJ[c]||[]).forEach(({to,idx})=>{ke.add(idx);if(!seen.has(to)){seen.add(to);st.push(to);}});}
    nodes.forEach(n=>{n._el.classList.toggle("dim",!seen.has(n.id));n._el.classList.toggle("hot",n.id===id);});
    edges.forEach((e,idx)=>{if(e._el){const on=ke.has(idx);e._el.style.opacity=on?(e.kind==="flow"?0.9:0.6):0.04;e._el.style.strokeWidth=on?e.w*(e.kind==="flow"?1.4:1):e.w;}});
  }
  function clearHi(){nodes.forEach(n=>n._el.classList.remove("dim","hot"));edges.forEach(e=>{if(e._el){e._el.style.opacity=e.kind==="flow"?0.5:0.32;e._el.style.strokeWidth=e.w;}});}

  let tx=0,ty2=0,k=1;
  const apply=()=>stage.style.transform=`translate(${tx}px,${ty2}px) scale(${k})`;
  function fit(){const wrap=document.getElementById("wrap"),W2=wrap.clientWidth,H=wrap.clientHeight;k=Math.min(W2/bounds.w,H/bounds.h,1)*0.97;if(!isFinite(k)||k<=0)k=.6;tx=Math.max(10,(W2-bounds.w*k)/2);ty2=14;apply();}
  const wrap=document.getElementById("wrap");
  wrap.addEventListener("wheel",(e)=>{e.preventDefault();const r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,f=e.deltaY<0?1.1:1/1.1,nk=Math.max(.12,Math.min(3,k*f));tx=mx-(mx-tx)*(nk/k);ty2=my-(my-ty2)*(nk/k);k=nk;apply();},{passive:false});
  let dg=false,lx=0,ly=0;
  wrap.addEventListener("mousedown",(e)=>{if(e.target.closest(".node")||e.target.closest(".drawer"))return;dg=true;wrap.classList.add("grabbing");lx=e.clientX;ly=e.clientY;});
  window.addEventListener("mousemove",(e)=>{if(!dg)return;tx+=e.clientX-lx;ty2+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apply();});
  window.addEventListener("mouseup",()=>{dg=false;wrap.classList.remove("grabbing");});
  document.getElementById("zin").onclick=()=>{k=Math.min(3,k*1.2);apply();};
  document.getElementById("zout").onclick=()=>{k=Math.max(.12,k/1.2);apply();};
  document.getElementById("fit").onclick=fit;
  document.getElementById("expP").onclick=()=>{Object.keys(sourcesByProv).forEach(p=>expP.add(p));refresh();fit();};
  document.getElementById("expD").onclick=()=>{domsPresent.forEach(d=>expD.add(d));refresh();fit();};
  document.getElementById("collapse").onclick=()=>{expP.clear();expD.clear();showInst.clear();fullCls.clear();closeDrawer();refresh();fit();};
  document.getElementById("q").addEventListener("keydown",(e)=>{
    if(e.key!=="Enter")return; const t=e.target.value.trim().toLowerCase(); if(!t)return;
    let m=sources.find(s=>s.id.toLowerCase().includes(t));
    if(m){ expP.add(provOf(m.id)); refresh(); if(NB["s:"+m.id])hi("s:"+m.id); return; }
    let c=classes.find(x=>x.name.toLowerCase().includes(t));
    if(c){ expD.add(c.domain); refresh(); if(NB["c:"+c.name])hi("c:"+c.name); }
  });

  if(!instances.length){document.getElementById("stat").textContent="데이터 미임베드 — tools/build_datalake_data.py 실행 필요";}
  refresh(); fit();
})();
</script>
</body>
</html>
